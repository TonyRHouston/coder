name: AI Triage Automation
on:
  workflow_dispatch: {}
jobs:
  traiage:
    name: Triage GitHub Issue with Claude Code
    runs-on: ubuntu-latest
    if: github.event.label.name == 'traiage' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 30
    env:
      CODER_URL: ${{ secrets.TRAIAGE_CODER_URL }}
      CODER_SESSION_TOKEN: ${{ secrets.TRAIAGE_CODER_SESSION_TOKEN }}
    permissions:
      contents: read
      issues: write
      actions: write
    steps:
    - name: Determine Inputs
      id: determine-inputs
      if: always()
      env:
        GITHUB_ACTOR: ${{ github.actor }}
        GITHUB_EVENT_ISSUE_HTML_URL: ${{ github.event.issue.html_url }}
        GITHUB_EVENT_NAME: ${{ github.event_name }}
        GITHUB_EVENT_USER_ID: ${{ github.event.sender.id }}
        GITHUB_EVENT_USER_LOGIN: ${{ github.event.sender.login }}
        INPUTS_ISSUE_URL: ${{ inputs.issue_url }}
        INPUTS_TEMPLATE_NAME: ${{ inputs.template_name || 'coder' }}
        INPUTS_TEMPLATE_PRESET: ${{ inputs.template_preset || ''}}
        INPUTS_PREFIX: ${{ inputs.prefix || 'traiage' }}
        GH_TOKEN: ${{ github.token }}
      run: "echo \"Using template name: ${INPUTS_TEMPLATE_NAME}\"\necho \"template_name=${INPUTS_TEMPLATE_NAME}\"\
        \ >> \"${GITHUB_OUTPUT}\"\n\necho \"Using template preset: ${INPUTS_TEMPLATE_PRESET}\"\
        \necho \"template_preset=${INPUTS_TEMPLATE_PRESET}\" >> \"${GITHUB_OUTPUT}\"\
        \n\necho \"Using prefix: ${INPUTS_PREFIX}\"\necho \"prefix=${INPUTS_PREFIX}\"\
        \ >> \"${GITHUB_OUTPUT}\"\n\n# For workflow_dispatch, use the actor who triggered\
        \ it\n# For issues events, use the issue author.\nif [[ \"${GITHUB_EVENT_NAME}\"\
        \ == \"workflow_dispatch\" ]]; then\n  if ! GITHUB_USER_ID=$(gh api \"users/${GITHUB_ACTOR}\"\
        \ --jq '.id'); then\n    echo \"::error::Failed to get GitHub user ID for\
        \ actor ${GITHUB_ACTOR}\"\n    exit 1\n  fi\n  echo \"Using workflow_dispatch\
        \ actor: ${GITHUB_ACTOR} (ID: ${GITHUB_USER_ID})\"\n  echo \"github_user_id=${GITHUB_USER_ID}\"\
        \ >> \"${GITHUB_OUTPUT}\"\n  echo \"github_username=${GITHUB_ACTOR}\" >> \"\
        ${GITHUB_OUTPUT}\"\n\n  echo \"Using issue URL: ${INPUTS_ISSUE_URL}\"\n  echo\
        \ \"issue_url=${INPUTS_ISSUE_URL}\" >> \"${GITHUB_OUTPUT}\"\n\n  exit 0\n\
        elif [[ \"${GITHUB_EVENT_NAME}\" == \"issues\" ]]; then\n  GITHUB_USER_ID=${GITHUB_EVENT_USER_ID}\n\
        \  echo \"Using issue author: ${GITHUB_EVENT_USER_LOGIN} (ID: ${GITHUB_USER_ID})\"\
        \n  echo \"github_user_id=${GITHUB_USER_ID}\" >> \"${GITHUB_OUTPUT}\"\n  echo\
        \ \"github_username=${GITHUB_EVENT_USER_LOGIN}\" >> \"${GITHUB_OUTPUT}\"\n\
        \n  echo \"Using issue URL: ${GITHUB_EVENT_ISSUE_HTML_URL}\"\n  echo \"issue_url=${GITHUB_EVENT_ISSUE_HTML_URL}\"\
        \ >> \"${GITHUB_OUTPUT}\"\n\n  exit 0\nelse\n  echo \"::error::Unsupported\
        \ event type: ${GITHUB_EVENT_NAME}\"\n  exit 1\nfi\n"
    - name: Verify push access
      env:
        GITHUB_REPOSITORY: ${{ github.repository }}
        GH_TOKEN: ${{ github.token }}
        GITHUB_USERNAME: ${{ steps.determine-inputs.outputs.github_username }}
        GITHUB_USER_ID: ${{ steps.determine-inputs.outputs.github_user_id }}
      run: "# Query the actor\u2019s permission on this repo\ncan_push=\"$(gh api\
        \ \"/repos/${GITHUB_REPOSITORY}/collaborators/${GITHUB_USERNAME}/permission\"\
        \ --jq '.user.permissions.push')\"\nif [[ \"${can_push}\" != \"true\" ]];\
        \ then\n  echo \"::error title=Access Denied::${GITHUB_USERNAME} does not\
        \ have push access to ${GITHUB_REPOSITORY}\"\n  exit 1\nfi\n"
    - name: Extract context key and description from issue
      id: extract-context
      env:
        ISSUE_URL: ${{ steps.determine-inputs.outputs.issue_url }}
        GH_TOKEN: ${{ github.token }}
      run: "issue_number=\"$(gh issue view \"${ISSUE_URL}\" --json number --jq '.number')\"\
        \ncontext_key=\"gh-${issue_number}\"\n\nTASK_PROMPT=$(cat <<EOF\nFix ${ISSUE_URL}\n\
        \n  1. Use the gh CLI to read the issue description and comments.\n  2. Think\
        \ carefully and try to understand the root cause. If the issue is unclear\
        \ or not well defined, ask me to clarify and provide more information.\n \
        \ 3. Write a proposed implementation plan to PLAN.md for me to review before\
        \ starting implementation. Your plan should use TDD and only make the minimal\
        \ changes necessary to fix the root cause.\n  4. When I approve your plan,\
        \ start working on it. If you encounter issues with the plan, ask me for clarification\
        \ and update the plan as required.\n  5. When you have finished implementation\
        \ according to the plan, commit and push your changes, and create a PR using\
        \ the gh CLI for me to review.\n\nEOF\n)\n\necho \"context_key=${context_key}\"\
        \ >> \"${GITHUB_OUTPUT}\"\n{\n  echo \"TASK_PROMPT<<EOF\"\n  echo \"${TASK_PROMPT}\"\
        \n  echo \"EOF\"\n} >> \"${GITHUB_OUTPUT}\"\n"
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: 1
        path: ./.github/actions/create-task-action
        persist-credentials: false
        ref: main
        repository: coder/create-task-action
    - name: Create Coder Task
      id: create_task
      uses: ./.github/actions/create-task-action
      with:
        coder-url: ${{ secrets.TRAIAGE_CODER_URL }}
        coder-token: ${{ secrets.TRAIAGE_CODER_SESSION_TOKEN }}
        coder-organization: default
        coder-template-name: coder
        coder-template-preset: ${{ steps.determine-inputs.outputs.template_preset
          }}
        coder-task-name-prefix: gh-coder
        coder-task-prompt: ${{ steps.extract-context.outputs.task_prompt }}
        github-user-id: ${{ steps.determine-inputs.outputs.github_user_id }}
        github-token: ${{ github.token }}
        github-issue-url: ${{ steps.determine-inputs.outputs.issue_url }}
        comment-on-issue: ${{ startsWith(steps.determine-inputs.outputs.issue_url,
          format('{0}/{1}', github.server_url, github.repository)) }}
    - name: Write outputs
      env:
        TASK_CREATED: ${{ steps.create_task.outputs.task-created }}
        TASK_NAME: ${{ steps.create_task.outputs.task-name }}
        TASK_URL: ${{ steps.create_task.outputs.task-url }}
      run: "{\n  echo \"**Task created:** ${TASK_CREATED}\"\n  echo \"**Task name:**\
        \    ${TASK_NAME}\"\n  echo \"**Task URL**:     ${TASK_URL}\"\n} >> \"${GITHUB_STEP_SUMMARY}\"\
        \n"
