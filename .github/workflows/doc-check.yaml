name: AI Documentation Check
on:
  workflow_dispatch: {}
jobs:
  doc-check:
    name: Analyze PR for Documentation Updates Needed
    runs-on: ubuntu-latest
    if: "(\n  github.event.action == 'opened' ||\n  github.event.action == 'synchronize'\
      \ ||\n  github.event.label.name == 'doc-check' ||\n  github.event.action ==\
      \ 'ready_for_review' ||\n  github.event_name == 'workflow_dispatch'\n) &&\n\
      (github.event.pull_request.draft == false || github.event_name == 'workflow_dispatch')\n"
    timeout-minutes: 30
    env:
      CODER_URL: ${{ secrets.DOC_CHECK_CODER_URL }}
      CODER_SESSION_TOKEN: ${{ secrets.DOC_CHECK_CODER_SESSION_TOKEN }}
    permissions:
      contents: read
      pull-requests: write
      actions: write
    steps:
    - name: Check if secrets are available
      id: check-secrets
      env:
        CODER_URL: ${{ secrets.DOC_CHECK_CODER_URL }}
        CODER_TOKEN: ${{ secrets.DOC_CHECK_CODER_SESSION_TOKEN }}
      run: "if [[ -z \"${CODER_URL}\" || -z \"${CODER_TOKEN}\" ]]; then\n  echo \"\
        skip=true\" >> \"${GITHUB_OUTPUT}\"\n  echo \"Secrets not available - skipping\
        \ doc-check.\"\n  echo \"This is expected for PRs where secrets are not available.\"\
        \n  echo \"Maintainers can manually trigger via workflow_dispatch if needed.\"\
        \n  {\n    echo \"\u26A0\uFE0F Workflow skipped: Secrets not available\"\n\
        \    echo \"\"\n    echo \"This workflow requires secrets that are unavailable\
        \ for this run.\"\n    echo \"Maintainers can manually trigger via workflow_dispatch\
        \ if needed.\"\n  } >> \"${GITHUB_STEP_SUMMARY}\"\nelse\n  echo \"skip=false\"\
        \ >> \"${GITHUB_OUTPUT}\"\nfi\n"
    - name: Setup Coder CLI
      if: steps.check-secrets.outputs.skip != 'true'
      uses: coder/setup-action@4a607a8113d4e676e2d7c34caa20a814bc88bfda
      with:
        access_url: ${{ secrets.DOC_CHECK_CODER_URL }}
        coder_session_token: ${{ secrets.DOC_CHECK_CODER_SESSION_TOKEN }}
    - name: Determine PR Context
      if: steps.check-secrets.outputs.skip != 'true'
      id: determine-context
      env:
        GITHUB_EVENT_NAME: ${{ github.event_name }}
        GITHUB_EVENT_ACTION: ${{ github.event.action }}
        GITHUB_EVENT_PR_HTML_URL: ${{ github.event.pull_request.html_url }}
        GITHUB_EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
        INPUTS_PR_URL: ${{ inputs.pr_url }}
        INPUTS_TEMPLATE_PRESET: ${{ inputs.template_preset || '' }}
      run: "echo \"Using template preset: ${INPUTS_TEMPLATE_PRESET}\"\necho \"template_preset=${INPUTS_TEMPLATE_PRESET}\"\
        \ >> \"${GITHUB_OUTPUT}\"\n\n# Determine trigger type for task context\nif\
        \ [[ \"${GITHUB_EVENT_NAME}\" == \"workflow_dispatch\" ]]; then\n  echo \"\
        trigger_type=manual\" >> \"${GITHUB_OUTPUT}\"\n  echo \"Using PR URL: ${INPUTS_PR_URL}\"\
        \n\n  # Validate PR URL format\n  if [[ ! \"${INPUTS_PR_URL}\" =~ ^https://github\\\
        .com/[^/]+/[^/]+/pull/[0-9]+$ ]]; then\n    echo \"::error::Invalid PR URL\
        \ format: ${INPUTS_PR_URL}\"\n    echo \"::error::Expected format: https://github.com/owner/repo/pull/NUMBER\"\
        \n    exit 1\n  fi\n\n  ISSUE_URL=\"${INPUTS_PR_URL/\\/pull\\//\\/issues\\\
        /}\"\n  echo \"pr_url=${ISSUE_URL}\" >> \"${GITHUB_OUTPUT}\"\n  PR_NUMBER=$(echo\
        \ \"${INPUTS_PR_URL}\" | grep -oP '(?<=pull/)\\d+')\n  echo \"pr_number=${PR_NUMBER}\"\
        \ >> \"${GITHUB_OUTPUT}\"\n\nelif [[ \"${GITHUB_EVENT_NAME}\" == \"pull_request\"\
        \ ]]; then\n  echo \"Using PR URL: ${GITHUB_EVENT_PR_HTML_URL}\"\n  ISSUE_URL=\"\
        ${GITHUB_EVENT_PR_HTML_URL/\\/pull\\//\\/issues\\/}\"\n  echo \"pr_url=${ISSUE_URL}\"\
        \ >> \"${GITHUB_OUTPUT}\"\n  echo \"pr_number=${GITHUB_EVENT_PR_NUMBER}\"\
        \ >> \"${GITHUB_OUTPUT}\"\n\n  # Set trigger type based on action\n  case\
        \ \"${GITHUB_EVENT_ACTION}\" in\n    opened)\n      echo \"trigger_type=new_pr\"\
        \ >> \"${GITHUB_OUTPUT}\"\n      ;;\n    synchronize)\n      echo \"trigger_type=pr_updated\"\
        \ >> \"${GITHUB_OUTPUT}\"\n      ;;\n    labeled)\n      echo \"trigger_type=label_requested\"\
        \ >> \"${GITHUB_OUTPUT}\"\n      ;;\n    ready_for_review)\n      echo \"\
        trigger_type=ready_for_review\" >> \"${GITHUB_OUTPUT}\"\n      ;;\n    *)\n\
        \      echo \"trigger_type=unknown\" >> \"${GITHUB_OUTPUT}\"\n      ;;\n \
        \ esac\n\nelse\n  echo \"::error::Unsupported event type: ${GITHUB_EVENT_NAME}\"\
        \n  exit 1\nfi\n"
    - name: Build task prompt
      if: steps.check-secrets.outputs.skip != 'true'
      id: extract-context
      env:
        PR_NUMBER: ${{ steps.determine-context.outputs.pr_number }}
        TRIGGER_TYPE: ${{ steps.determine-context.outputs.trigger_type }}
      run: "echo \"Analyzing PR #${PR_NUMBER} (trigger: ${TRIGGER_TYPE})\"\n\n# Build\
        \ context based on trigger type\ncase \"${TRIGGER_TYPE}\" in\n  new_pr)\n\
        \    CONTEXT=\"This is a NEW PR. Perform initial documentation review.\"\n\
        \    ;;\n  pr_updated)\n    CONTEXT=\"This PR was UPDATED with new commits.\
        \ Check if previous feedback was addressed or if new doc needs arose.\"\n\
        \    ;;\n  label_requested)\n    CONTEXT=\"A documentation review was REQUESTED\
        \ via label. Perform a thorough review.\"\n    ;;\n  ready_for_review)\n \
        \   CONTEXT=\"This PR was marked READY FOR REVIEW. Perform a thorough review.\"\
        \n    ;;\n  manual)\n    CONTEXT=\"This is a MANUAL review request. Perform\
        \ a thorough review.\"\n    ;;\n  *)\n    CONTEXT=\"Perform a documentation\
        \ review.\"\n    ;;\nesac\n\n# Build task prompt with sticky comment logic\n\
        TASK_PROMPT=\"Use the doc-check skill to review PR #${PR_NUMBER} in coder/coder.\n\
        \n${CONTEXT}\n\nUse \\`gh\\` to get PR details, diff, and all comments. Look\
        \ for an existing doc-check comment containing \\`<!-- doc-check-sticky -->\\\
        ` - if one exists, you'll update it instead of creating a new one.\n\n**Do\
        \ not comment if no documentation changes are needed.**\n\nIf a sticky comment\
        \ already exists, compare your current findings against it:\n- Check off \\\
        `[x]\\` items that are now addressed\n- Strikethrough items no longer needed\
        \ (e.g., code was reverted)\n- Add new unchecked \\`[ ]\\` items for newly\
        \ discovered needs\n- If an item is checked but you can't verify the docs\
        \ were added, add a warning note below it\n- If nothing meaningful changed,\
        \ don't update the comment at all\n\n## Comment format\n\nUse this structure\
        \ (only include relevant sections):\n\n\\`\\`\\`\n## Documentation Check\n\
        \n### Updates Needed\n- [ ] \\`docs/path/file.md\\` - What needs to change\n\
        - [x] \\`docs/other/file.md\\` - This was addressed\n- ~~\\`docs/removed.md\\\
        ` - No longer needed~~ *(reverted in abc123)*\n\n### New Documentation Needed\n\
        - [ ] \\`docs/suggested/path.md\\` - What should be documented\n  > \u26A0\
        \uFE0F *Checked but no corresponding documentation changes found in this PR*\n\
        \n---\n*Automated review via [Coder Tasks](https://coder.com/docs/ai-coder/tasks)*\n\
        <!-- doc-check-sticky -->\n\\`\\`\\`\n\nThe \\`<!-- doc-check-sticky -->\\\
        ` marker must be at the end so future runs can find and update this comment.\"\
        \n\n# Output the prompt\n{\n  echo \"task_prompt<<EOFOUTPUT\"\n  echo \"${TASK_PROMPT}\"\
        \n  echo \"EOFOUTPUT\"\n} >> \"${GITHUB_OUTPUT}\"\n"
    - name: Checkout create-task-action
      if: steps.check-secrets.outputs.skip != 'true'
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: 1
        path: ./.github/actions/create-task-action
        persist-credentials: false
        ref: main
        repository: coder/create-task-action
    - name: Create Coder Task for Documentation Check
      if: steps.check-secrets.outputs.skip != 'true'
      id: create_task
      uses: ./.github/actions/create-task-action
      with:
        coder-url: ${{ secrets.DOC_CHECK_CODER_URL }}
        coder-token: ${{ secrets.DOC_CHECK_CODER_SESSION_TOKEN }}
        coder-organization: default
        coder-template-name: coder-workflow-bot
        coder-template-preset: ${{ steps.determine-context.outputs.template_preset
          }}
        coder-task-name-prefix: doc-check
        coder-task-prompt: ${{ steps.extract-context.outputs.task_prompt }}
        coder-username: doc-check-bot
        github-token: ${{ github.token }}
        github-issue-url: ${{ steps.determine-context.outputs.pr_url }}
        comment-on-issue: false
    - name: Write Task Info
      if: steps.check-secrets.outputs.skip != 'true'
      env:
        TASK_CREATED: ${{ steps.create_task.outputs.task-created }}
        TASK_NAME: ${{ steps.create_task.outputs.task-name }}
        TASK_URL: ${{ steps.create_task.outputs.task-url }}
        PR_URL: ${{ steps.determine-context.outputs.pr_url }}
      run: "{\n  echo \"## Documentation Check Task\"\n  echo \"\"\n  echo \"**PR:**\
        \ ${PR_URL}\"\n  echo \"**Task created:** ${TASK_CREATED}\"\n  echo \"**Task\
        \ name:** ${TASK_NAME}\"\n  echo \"**Task URL:** ${TASK_URL}\"\n  echo \"\"\
        \n} >> \"${GITHUB_STEP_SUMMARY}\"\n"
    - name: Wait for Task Completion
      if: steps.check-secrets.outputs.skip != 'true'
      id: wait_task
      env:
        TASK_NAME: ${{ steps.create_task.outputs.task-name }}
      run: "echo \"Waiting for task to complete...\"\necho \"Task name: ${TASK_NAME}\"\
        \n\nif [[ -z \"${TASK_NAME}\" ]]; then\n  echo \"::error::TASK_NAME is empty\"\
        \n  exit 1\nfi\n\nMAX_WAIT=600  # 10 minutes\nWAITED=0\nPOLL_INTERVAL=3\n\
        LAST_STATUS=\"\"\n\nis_workspace_message() {\n  local msg=\"$1\"\n  [[ -z\
        \ \"$msg\" ]] && return 0  # Empty = treat as workspace/startup\n  [[ \"$msg\"\
        \ =~ ^Workspace ]] && return 0\n  [[ \"$msg\" =~ ^Agent ]] && return 0\n \
        \ return 1\n}\n\nwhile [[ $WAITED -lt $MAX_WAIT ]]; do\n  # Get task status\
        \ (|| true prevents set -e from exiting on non-zero)\n  RAW_OUTPUT=$(coder\
        \ task status \"${TASK_NAME}\" -o json 2>&1) || true\n  STATUS_JSON=$(echo\
        \ \"$RAW_OUTPUT\" | grep -v \"^version mismatch\\|^download v\" || true)\n\
        \n  # Debug: show first poll's raw output\n  if [[ $WAITED -eq 0 ]]; then\n\
        \    echo \"Raw status output: ${RAW_OUTPUT:0:500}\"\n  fi\n\n  if [[ -z \"\
        $STATUS_JSON\" ]] || ! echo \"$STATUS_JSON\" | jq -e . >/dev/null 2>&1; then\n\
        \    if [[ \"$LAST_STATUS\" != \"waiting\" ]]; then\n      echo \"[${WAITED}s]\
        \ Waiting for task status...\"\n      LAST_STATUS=\"waiting\"\n    fi\n  \
        \  sleep $POLL_INTERVAL\n    WAITED=$((WAITED + POLL_INTERVAL))\n    continue\n\
        \  fi\n\n  TASK_STATE=$(echo \"$STATUS_JSON\" | jq -r '.current_state.state\
        \ // \"unknown\"')\n  TASK_MESSAGE=$(echo \"$STATUS_JSON\" | jq -r '.current_state.message\
        \ // \"\"')\n  WORKSPACE_STATUS=$(echo \"$STATUS_JSON\" | jq -r '.workspace_status\
        \ // \"unknown\"')\n\n  # Build current status string for comparison\n  CURRENT_STATUS=\"\
        ${TASK_STATE}|${WORKSPACE_STATUS}|${TASK_MESSAGE}\"\n\n  # Only log if status\
        \ changed\n  if [[ \"$CURRENT_STATUS\" != \"$LAST_STATUS\" ]]; then\n    if\
        \ [[ \"$TASK_STATE\" == \"idle\" ]] && is_workspace_message \"$TASK_MESSAGE\"\
        ; then\n      echo \"[${WAITED}s] Workspace ready, waiting for Agent...\"\n\
        \    else\n      echo \"[${WAITED}s] State: ${TASK_STATE} | Workspace: ${WORKSPACE_STATUS}\
        \ | ${TASK_MESSAGE}\"\n    fi\n    LAST_STATUS=\"$CURRENT_STATUS\"\n  fi\n\
        \n  if [[ \"$WORKSPACE_STATUS\" == \"failed\" || \"$WORKSPACE_STATUS\" ==\
        \ \"canceled\" ]]; then\n    echo \"::error::Workspace failed: ${WORKSPACE_STATUS}\"\
        \n    exit 1\n  fi\n\n  if [[ \"$TASK_STATE\" == \"idle\" ]]; then\n    if\
        \ ! is_workspace_message \"$TASK_MESSAGE\"; then\n      # Real completion\
        \ message from Claude!\n      echo \"\"\n      echo \"Task completed: ${TASK_MESSAGE}\"\
        \n      RESULT_URI=$(echo \"$STATUS_JSON\" | jq -r '.current_state.uri //\
        \ \"\"')\n      echo \"result_uri=${RESULT_URI}\" >> \"${GITHUB_OUTPUT}\"\n\
        \      echo \"task_message=${TASK_MESSAGE}\" >> \"${GITHUB_OUTPUT}\"\n   \
        \   break\n    fi\n  fi\n\n  sleep $POLL_INTERVAL\n  WAITED=$((WAITED + POLL_INTERVAL))\n\
        done\n\nif [[ $WAITED -ge $MAX_WAIT ]]; then\n  echo \"::error::Task monitoring\
        \ timed out after ${MAX_WAIT}s\"\n  exit 1\nfi\n"
    - name: Fetch Task Logs
      if: always() && steps.check-secrets.outputs.skip != 'true'
      env:
        TASK_NAME: ${{ steps.create_task.outputs.task-name }}
      run: "echo \"::group::Task Conversation Log\"\nif [[ -n \"${TASK_NAME}\" ]];\
        \ then\n  coder task logs \"${TASK_NAME}\" 2>&1 || echo \"Failed to fetch\
        \ logs\"\nelse\n  echo \"No task name, skipping log fetch\"\nfi\necho \"::endgroup::\"\
        \n"
    - name: Cleanup Task
      if: always() && steps.check-secrets.outputs.skip != 'true'
      env:
        TASK_NAME: ${{ steps.create_task.outputs.task-name }}
      run: "if [[ -n \"${TASK_NAME}\" ]]; then\n  echo \"Deleting task: ${TASK_NAME}\"\
        \n  coder task delete \"${TASK_NAME}\" -y 2>&1 || echo \"Task deletion failed\
        \ or already deleted\"\nelse\n  echo \"No task name, skipping cleanup\"\n\
        fi\n"
    - name: Write Final Summary
      if: always() && steps.check-secrets.outputs.skip != 'true'
      env:
        TASK_NAME: ${{ steps.create_task.outputs.task-name }}
        TASK_MESSAGE: ${{ steps.wait_task.outputs.task_message }}
        RESULT_URI: ${{ steps.wait_task.outputs.result_uri }}
        PR_NUMBER: ${{ steps.determine-context.outputs.pr_number }}
      run: "{\n  echo \"\"\n  echo \"---\"\n  echo \"### Result\"\n  echo \"\"\n \
        \ echo \"**Status:** ${TASK_MESSAGE:-Task completed}\"\n  if [[ -n \"${RESULT_URI}\"\
        \ ]]; then\n    echo \"**Comment:** ${RESULT_URI}\"\n  fi\n  echo \"\"\n \
        \ echo \"Task \\`${TASK_NAME}\\` has been cleaned up.\"\n} >> \"${GITHUB_STEP_SUMMARY}\"\
        \n"
