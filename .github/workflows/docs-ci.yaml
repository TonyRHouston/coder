name: Docs CI
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        persist-credentials: false
    - name: Setup Node
      uses: ./.github/actions/setup-node
    - uses: tj-actions/changed-files@e0021407031f5be11a464abee9a0776171c79891
      id: changed-files
      with:
        files: 'docs/**

          **.md

          '
        separator: ','
    - name: lint
      if: steps.changed-files.outputs.any_changed == 'true'
      run: '# shellcheck disable=SC2086

        pnpm exec markdownlint-cli2 $ALL_CHANGED_FILES

        '
      env:
        ALL_CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
    - name: fmt
      if: steps.changed-files.outputs.any_changed == 'true'
      run: '# markdown-table-formatter requires a space separated list of files

        # shellcheck disable=SC2086

        echo $ALL_CHANGED_FILES | tr '','' ''\n'' | pnpm exec markdown-table-formatter
        --check

        '
      env:
        ALL_CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
