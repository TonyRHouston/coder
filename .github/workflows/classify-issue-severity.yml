name: Classify Issue Severity
on:
  workflow_dispatch: {}
jobs:
  classify-severity:
    name: AI Severity Classification
    runs-on: ubuntu-latest
    if: '(github.event.label.name == ''triage-check'' || github.event_name == ''workflow_dispatch'')

      '
    timeout-minutes: 30
    env:
      CODER_URL: ${{ secrets.DOC_CHECK_CODER_URL }}
      CODER_SESSION_TOKEN: ${{ secrets.DOC_CHECK_CODER_SESSION_TOKEN }}
    permissions:
      contents: read
      issues: write
      actions: write
    steps:
    - name: Determine Issue Context
      id: determine-context
      env:
        GITHUB_ACTOR: ${{ github.actor }}
        GITHUB_EVENT_NAME: ${{ github.event_name }}
        GITHUB_EVENT_ISSUE_HTML_URL: ${{ github.event.issue.html_url }}
        GITHUB_EVENT_ISSUE_NUMBER: ${{ github.event.issue.number }}
        GITHUB_EVENT_SENDER_ID: ${{ github.event.sender.id }}
        GITHUB_EVENT_SENDER_LOGIN: ${{ github.event.sender.login }}
        INPUTS_ISSUE_URL: ${{ inputs.issue_url }}
        INPUTS_TEMPLATE_PRESET: ${{ inputs.template_preset || '' }}
        GH_TOKEN: ${{ github.token }}
      run: "echo \"Using template preset: ${INPUTS_TEMPLATE_PRESET}\"\necho \"template_preset=${INPUTS_TEMPLATE_PRESET}\"\
        \ >> \"${GITHUB_OUTPUT}\"\n\n# For workflow_dispatch, use the provided issue\
        \ URL\nif [[ \"${GITHUB_EVENT_NAME}\" == \"workflow_dispatch\" ]]; then\n\
        \  if ! GITHUB_USER_ID=$(gh api \"users/${GITHUB_ACTOR}\" --jq '.id'); then\n\
        \    echo \"::error::Failed to get GitHub user ID for actor ${GITHUB_ACTOR}\"\
        \n    exit 1\n  fi\n  echo \"Using workflow_dispatch actor: ${GITHUB_ACTOR}\
        \ (ID: ${GITHUB_USER_ID})\"\n  echo \"github_user_id=${GITHUB_USER_ID}\" >>\
        \ \"${GITHUB_OUTPUT}\"\n  echo \"github_username=${GITHUB_ACTOR}\" >> \"${GITHUB_OUTPUT}\"\
        \n\n  echo \"Using issue URL: ${INPUTS_ISSUE_URL}\"\n  echo \"issue_url=${INPUTS_ISSUE_URL}\"\
        \ >> \"${GITHUB_OUTPUT}\"\n\n  # Extract issue number from URL for later use\n\
        \  ISSUE_NUMBER=$(echo \"${INPUTS_ISSUE_URL}\" | grep -oP '(?<=issues/)\\\
        d+')\n  echo \"issue_number=${ISSUE_NUMBER}\" >> \"${GITHUB_OUTPUT}\"\n\n\
        elif [[ \"${GITHUB_EVENT_NAME}\" == \"issues\" ]]; then\n  GITHUB_USER_ID=${GITHUB_EVENT_SENDER_ID}\n\
        \  echo \"Using label adder: ${GITHUB_EVENT_SENDER_LOGIN} (ID: ${GITHUB_USER_ID})\"\
        \n  echo \"github_user_id=${GITHUB_USER_ID}\" >> \"${GITHUB_OUTPUT}\"\n  echo\
        \ \"github_username=${GITHUB_EVENT_SENDER_LOGIN}\" >> \"${GITHUB_OUTPUT}\"\
        \n\n  echo \"Using issue URL: ${GITHUB_EVENT_ISSUE_HTML_URL}\"\n  echo \"\
        issue_url=${GITHUB_EVENT_ISSUE_HTML_URL}\" >> \"${GITHUB_OUTPUT}\"\n  echo\
        \ \"issue_number=${GITHUB_EVENT_ISSUE_NUMBER}\" >> \"${GITHUB_OUTPUT}\"\n\n\
        else\n  echo \"::error::Unsupported event type: ${GITHUB_EVENT_NAME}\"\n \
        \ exit 1\nfi\n"
    - name: Build Classification Prompt
      id: build-prompt
      env:
        ISSUE_URL: ${{ steps.determine-context.outputs.issue_url }}
        ISSUE_NUMBER: ${{ steps.determine-context.outputs.issue_number }}
        GH_TOKEN: ${{ github.token }}
      run: "echo \"Analyzing issue #${ISSUE_NUMBER}\"\n\n# Build task prompt - using\
        \ unquoted heredoc so variables expand\nTASK_PROMPT=$(cat <<EOF\nYou are an\
        \ expert software engineer triaging customer-reported issues for Coder, a\
        \ cloud development environment platform.\n\nYour task is to carefully analyze\
        \ issue #${ISSUE_NUMBER} and classify it into one of the following severity\
        \ levels. **This requires deep reasoning and thoughtful analysis** - not just\
        \ keyword matching.\n\nIssue URL: ${ISSUE_URL}\n\nWORKFLOW:\n  1. Use GitHub\
        \ MCP tools to fetch the full issue details\n     Get the title, description,\
        \ labels, and any comments that provide context\n\n  2. Read and understand\
        \ the issue\n     What is the user reporting?\n     What are the symptoms?\n\
        \     What is the expected vs actual behavior?\n\n  3. Analyze using the framework\
        \ below\n     Think deeply about each of the 5 analysis points\n     Don't\
        \ just match keywords - reason about the actual impact\n\n  4. Classify the\
        \ severity OR decline if insufficient information\n\n  5. Comment on the issue\
        \ with your analysis\n\n## Severity Level Definitions\n\n- **s0**: Entire\
        \ product and/or major feature (Tasks, Bridge, Boundaries, etc.) is broken\
        \ in a way that makes it unusable for majority to all customers\n\n- **s1**:\
        \ Core feature is broken without a workaround for limited number of customers\n\
        \n- **s2**: Broken use cases or features with a workaround\n\n- **s3**: Issues\
        \ that impair usability, cause incorrect behavior in non-critical areas, or\
        \ degrade the experience, but do not block core workflows\n\n- **s4**: Bugs\
        \ that confuse or annoy or are purely cosmetic, e.g. we don't plan on addressing\
        \ them\n\n## Analysis Framework\n\nCustomers often overstate the severity\
        \ of issues. You need to read between the lines and assess the **actual impact**\
        \ by reasoning through:\n\n1. **What is actually broken?**\n   - Distinguish\
        \ between what the customer *says* is broken vs. what is *actually* broken\n\
        \   - Is this a complete failure or a partial degradation?\n   - Does the\
        \ error message or symptom indicate a critical vs. minor issue?\n\n2. **How\
        \ many users are affected?**\n   - Is this affecting all customers, many customers,\
        \ or a specific edge case?\n   - Does the issue description suggest widespread\
        \ impact or isolated incident?\n   - Are there environmental factors that\
        \ limit the scope?\n\n3. **Are there workarounds?**\n   - Can users accomplish\
        \ their goal through an alternative path?\n   - Is there a manual process\
        \ or configuration change that resolves it?\n   - Even if not mentioned, do\
        \ you suspect a workaround exists?\n\n4. **Does it block critical workflows?**\n\
        \   - Can users still perform their core job functions?\n   - Is this interrupting\
        \ active development work or just an inconvenience?\n   - What is the business\
        \ impact if this remains unresolved?\n\n5. **What is the realistic urgency?**\n\
        \   - Does this need immediate attention or can it wait?\n   - Is this a regression\
        \ or long-standing issue?\n   - What's the actual business risk?\n\n## Insufficient\
        \ Information Fail-Safe\n\n**It is completely acceptable to not classify an\
        \ issue if you lack sufficient information.**\n\nIf the issue description\
        \ is too vague, missing critical details, or doesn't provide enough context\
        \ to make a confident assessment, DO NOT force a classification.\n\nCommon\
        \ scenarios where you should decline to classify:\n- Issue has no description\
        \ or minimal details\n- Unclear what feature/component is affected\n- No reproduction\
        \ steps or error messages provided\n- Ambiguous whether it's a bug, feature\
        \ request, or question\n- Missing information about user impact or frequency\n\
        \n## Comment Format\n\nUse ONE of these two formats when commenting on the\
        \ issue:\n\n### Format 1: Confident Classification\n\n## \U0001F916 Automated\
        \ Severity Classification\n\n**Recommended Severity:** \\`S0\\` | \\`S1\\\
        ` | \\`S2\\` | \\`S3\\` | \\`S4\\`\n\n**Analysis:**\n[2-3 sentences explaining\
        \ your reasoning - focus on the actual impact, not just symptoms. Explain\
        \ why you chose this severity level over others.]\n\n---\n*This classification\
        \ was performed by AI analysis. Please review and adjust if needed.*\n\n###\
        \ Format 2: Insufficient Information\n\n## \U0001F916 Automated Severity Classification\n\
        \n**Status:** Unable to classify - insufficient information\n\n**Reasoning:**\n\
        [2-3 sentences explaining what critical information is missing and why it's\
        \ needed to determine severity.]\n\n**Suggested next steps:**\n- [Specific\
        \ information point 1]\n- [Specific information point 2]\n- [Specific information\
        \ point 3]\n\n---\n*This classification was performed by AI analysis. Please\
        \ provide the requested information for proper severity assessment.*\n\nEOF\n\
        )\n\n# Output the prompt\n{\n  echo \"task_prompt<<EOFOUTPUT\"\n  echo \"\
        ${TASK_PROMPT}\"\n  echo \"EOFOUTPUT\"\n} >> \"${GITHUB_OUTPUT}\"\n"
    - name: Checkout create-task-action
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: 1
        path: ./.github/actions/create-task-action
        persist-credentials: false
        ref: main
        repository: coder/create-task-action
    - name: Create Coder Task for Severity Classification
      id: create_task
      uses: ./.github/actions/create-task-action
      with:
        coder-url: ${{ secrets.DOC_CHECK_CODER_URL }}
        coder-token: ${{ secrets.DOC_CHECK_CODER_SESSION_TOKEN }}
        coder-organization: default
        coder-template-name: coder
        coder-template-preset: ${{ steps.determine-context.outputs.template_preset
          }}
        coder-task-name-prefix: severity-classification
        coder-task-prompt: ${{ steps.build-prompt.outputs.task_prompt }}
        github-user-id: ${{ steps.determine-context.outputs.github_user_id }}
        github-token: ${{ github.token }}
        github-issue-url: ${{ steps.determine-context.outputs.issue_url }}
        comment-on-issue: true
    - name: Write outputs
      env:
        TASK_CREATED: ${{ steps.create_task.outputs.task-created }}
        TASK_NAME: ${{ steps.create_task.outputs.task-name }}
        TASK_URL: ${{ steps.create_task.outputs.task-url }}
        ISSUE_URL: ${{ steps.determine-context.outputs.issue_url }}
      run: "{\n  echo \"## Severity Classification Task\"\n  echo \"\"\n  echo \"\
        **Issue:** ${ISSUE_URL}\"\n  echo \"**Task created:** ${TASK_CREATED}\"\n\
        \  echo \"**Task name:** ${TASK_NAME}\"\n  echo \"**Task URL:** ${TASK_URL}\"\
        \n  echo \"\"\n  echo \"The Coder task is analyzing the issue and will comment\
        \ with severity classification.\"\n} >> \"${GITHUB_STEP_SUMMARY}\"\n"
