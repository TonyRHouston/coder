          \ }}\",\n      \"github_run_id\": \"${{ github.run_id }}\"\n    }\n  },\n\
          \  \"metadata\": {\n    \"buildInvocationID\": \"${{ github.run_id }}\"\
          ,\n    \"completeness\": {\n      \"environment\": true,\n      \"materials\"\
          : true\n    }\n  }\n}\n"
        push-to-registry: true
    - name: Check attestation status
      if: github.ref == 'refs/heads/main'
      run: "if [[ \"${{ steps.attest_main.outcome }}\" == \"failure\" ]]; then\n \
        \ echo \"::warning::GitHub attestation for main tag failed\"\nfi\nif [[ \"\
        ${{ steps.attest_latest.outcome }}\" == \"failure\" ]]; then\n  echo \"::warning::GitHub\
        \ attestation for latest tag failed\"\nfi\nif [[ \"${{ steps.attest_version.outcome\
        \ }}\" == \"failure\" ]]; then\n  echo \"::warning::GitHub attestation for\
        \ version-specific tag failed\"\nfi\n"
    - name: Prune old images
      if: github.ref == 'refs/heads/main'
      uses: vlaurin/action-ghcr-prune@0cf7d39f88546edd31965acba78cdcb0be14d641
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        organization: coder
        container: coder-preview
        keep-younger-than: 7
        keep-tags: latest
        keep-tags-regexes: ^pr
        prune-tags-regexes: '^main-

          ^v

          '
        prune-untagged: true
    - name: Upload build artifacts
      if: github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
      with:
        name: coder
        path: './build/*.zip

          ./build/*.tar.gz

          ./build/*.deb

          '
        retention-days: 7
  deploy:
    needs:
    - changes
    - build
    if: '(github.ref == ''refs/heads/main'' || startsWith(github.ref, ''refs/heads/release/''))

      && needs.changes.outputs.docs-only == ''false''

      && !github.event.pull_request.head.repo.fork

      '
    uses: ./.github/workflows/deploy.yaml
    with:
      image: ${{ needs.build.outputs.IMAGE }}
    permissions:
      contents: read
      id-token: write
      packages: write
    secrets:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      FLY_PARIS_CODER_PROXY_SESSION_TOKEN: ${{ secrets.FLY_PARIS_CODER_PROXY_SESSION_TOKEN
        }}
      FLY_SYDNEY_CODER_PROXY_SESSION_TOKEN: ${{ secrets.FLY_SYDNEY_CODER_PROXY_SESSION_TOKEN
        }}
      FLY_SAO_PAULO_CODER_PROXY_SESSION_TOKEN: ${{ secrets.FLY_SAO_PAULO_CODER_PROXY_SESSION_TOKEN
        }}
      FLY_JNB_CODER_PROXY_SESSION_TOKEN: ${{ secrets.FLY_JNB_CODER_PROXY_SESSION_TOKEN
        }}
  sqlc-vet:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.db == 'true' || needs.changes.outputs.ci == 'true' ||
      github.ref == 'refs/heads/main'
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e
      with:
        egress-policy: audit
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: 1
        persist-credentials: false
    - name: Setup Go
      uses: ./.github/actions/setup-go
    - name: Setup sqlc
      uses: ./.github/actions/setup-sqlc
    - name: Setup and run sqlc vet
      run: 'make sqlc-vet

        '
  notify-slack-on-failure:
    needs:
    - required
    runs-on: ubuntu-latest
    if: failure() && github.ref == 'refs/heads/main'
    steps:
    - name: Send Slack notification
      run: "ESCAPED_PROMPT=$(printf \"%s\" \"<@U09LQ75AHKR> $BLINK_CI_FAILURE_PROMPT\"\
        \ | jq -Rsa .)\ncurl -X POST -H 'Content-type: application/json' \\\n--data\
        \ '{\n  \"blocks\": [\n    {\n      \"type\": \"header\",\n      \"text\"\
        : {\n        \"type\": \"plain_text\",\n        \"text\": \"\u274C CI Failure\
        \ in main\",\n        \"emoji\": true\n      }\n    },\n    {\n      \"type\"\
        : \"section\",\n      \"text\": {\n        \"type\": \"mrkdwn\",\n       \
        \ \"text\": \"*View failure:* <'\"${RUN_URL}\"'|Click here>\"\n      }\n \
        \   },\n    {\n      \"type\": \"section\",\n      \"text\": {\n        \"\
        type\": \"mrkdwn\",\n        \"text\": '\"$ESCAPED_PROMPT\"'\n      }\n  \
        \  }\n  ]\n}' \"${SLACK_WEBHOOK}\"\n"
      env:
        SLACK_WEBHOOK: ${{ secrets.CI_FAILURE_SLACK_WEBHOOK }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{
          github.run_id }}
        BLINK_CI_FAILURE_PROMPT: ${{ vars.BLINK_CI_FAILURE_PROMPT }}
