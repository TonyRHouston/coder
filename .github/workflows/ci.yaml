    - name: Install nfpm
      run: ./.github/scripts/retry.sh -- go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.35.1
    - name: Install zstd
      run: sudo apt-get install -y zstd
    - name: Build
      run: 'set -euxo pipefail

        ./.github/scripts/retry.sh -- go mod download

        make gen/mark-fresh

        make build

        '
  build:
