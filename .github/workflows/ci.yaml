    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e
      with:
        egress-policy: audit
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: 0
        ref: ${{ github.event.pull_request.head.ref }}
        persist-credentials: false
    - name: Setup Node
      uses: ./.github/actions/setup-node
    - name: Publish to Chromatic (non-mainline)
      if: github.ref != 'refs/heads/main' && github.repository_owner == 'coder'
      uses: chromaui/action@07791f8243f4cb2698bf4d00426baf4b2d1cb7e0
      env:
        NODE_OPTIONS: --max_old_space_size=4096
        STORYBOOK: true
      with:
        buildScriptName: storybook:ci
        exitOnceUploaded: true
        exitZeroOnChanges: true
        projectToken: 695c25b6cb65
        workingDir: ./site
        storybookBaseDir: ./site
        storybookConfigDir: ./site/.storybook
        skip: '@(renovate/**|dependabot/**)'
        onlyChanged: true
        zip: true
    - name: Publish to Chromatic (mainline)
      if: github.ref == 'refs/heads/main' && github.repository_owner == 'coder'
      uses: chromaui/action@07791f8243f4cb2698bf4d00426baf4b2d1cb7e0
      env:
        NODE_OPTIONS: --max_old_space_size=4096
        STORYBOOK: true
      with:
        autoAcceptChanges: true
        exitZeroOnChanges: true
        buildScriptName: storybook:build
        projectToken: 695c25b6cb65
        workingDir: ./site
        storybookBaseDir: ./site
        storybookConfigDir: ./site/.storybook
        onlyChanged: true
        zip: true
  offlinedocs:
    name: offlinedocs
    needs: changes
    runs-on: ubuntu-latest
    if: needs.changes.outputs.offlinedocs == 'true' || needs.changes.outputs.ci ==
      'true' || needs.changes.outputs.docs == 'true'
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e
      with:
        egress-policy: audit
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: 0
        persist-credentials: false
    - name: Setup Node
      uses: ./.github/actions/setup-node
      with:
        directory: offlinedocs
    - name: Install Protoc
      run: 'mkdir -p /tmp/proto

        pushd /tmp/proto

        curl -L -o protoc.zip https://github.com/protocolbuffers/protobuf/releases/download/v23.4/protoc-23.4-linux-x86_64.zip

        unzip protoc.zip

        sudo cp -r ./bin/* /usr/local/bin

        sudo cp -r ./include /usr/local/bin/include

        popd

        '
    - name: Setup Go
      uses: ./.github/actions/setup-go
    - name: Install go tools
      uses: ./.github/actions/setup-go-tools
    - name: Setup sqlc
      uses: ./.github/actions/setup-sqlc
    - name: Format
      run: 'cd offlinedocs

        pnpm format:check

        '
    - name: Lint
      run: 'cd offlinedocs

        pnpm lint

        '
    - name: Build
      run: 'make build/coder_docs_"$(./scripts/version.sh)".tgz

        '
  required:
    runs-on: ubuntu-latest
    needs:
    - changes
    - fmt
    - lint
    - lint-actions
    - gen
    - test-go-pg
    - test-go-pg-17
    - test-go-race-pg
    - test-js
    - test-e2e
    - offlinedocs
    - sqlc-vet
    - check-build
    if: always()
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e
      with:
        egress-policy: audit
    - name: Ensure required checks
      run: "echo \"Checking required checks\"\necho \"- changes: ${{ needs.changes.result\
        \ }}\"\necho \"- fmt: ${{ needs.fmt.result }}\"\necho \"- lint: ${{ needs.lint.result\
        \ }}\"\necho \"- lint-actions: ${{ needs.lint-actions.result }}\"\necho \"\
        - gen: ${{ needs.gen.result }}\"\necho \"- test-go-pg: ${{ needs.test-go-pg.result\
        \ }}\"\necho \"- test-go-pg-17: ${{ needs.test-go-pg-17.result }}\"\necho\
        \ \"- test-go-race-pg: ${{ needs.test-go-race-pg.result }}\"\necho \"- test-js:\
        \ ${{ needs.test-js.result }}\"\necho \"- test-e2e: ${{ needs.test-e2e.result\
        \ }}\"\necho \"- offlinedocs: ${{ needs.offlinedocs.result }}\"\necho \"-\
        \ check-build: ${{ needs.check-build.result }}\"\necho\n\n# We allow skipped\
        \ jobs to pass, but not failed or cancelled jobs.\nif [[ \"${{ contains(needs.*.result,\
        \ 'failure') }}\" == \"true\" || \"${{ contains(needs.*.result, 'cancelled')\
        \ }}\" == \"true\" ]]; then\n  echo \"One of the required checks has failed\
        \ or has been cancelled\"\n  exit 1\nfi\n\necho \"Required checks have passed\"\
        \n"
  build-dylib:
    needs: changes
    if: needs.changes.outputs.go == 'true' || needs.changes.outputs.ci == 'true' ||
      github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: 0
        persist-credentials: false
    - name: Setup GNU tools (macOS)
      uses: ./.github/actions/setup-gnu-tools
    - name: Switch XCode Version
      uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd
      with:
        xcode-version: 16.1.0
    - name: Setup Go
      uses: ./.github/actions/setup-go
    - name: Install rcodesign
      if: ${{ github.repository_owner == 'coder' && (github.ref == 'refs/heads/main'
        || startsWith(github.ref, 'refs/heads/release/')) }}
      run: "set -euo pipefail\nwget -O /tmp/rcodesign.tar.gz https://github.com/indygreg/apple-platform-rs/releases/download/apple-codesign%2F0.22.0/apple-codesign-0.22.0-macos-universal.tar.gz\n\
        sudo tar -xzf /tmp/rcodesign.tar.gz \\\n  -C /usr/local/bin \\\n  --strip-components=1\
        \ \\\n  apple-codesign-0.22.0-macos-universal/rcodesign\nrm /tmp/rcodesign.tar.gz\n"
    - name: Setup Apple Developer certificate and API key
      if: ${{ github.repository_owner == 'coder' && (github.ref == 'refs/heads/main'
        || startsWith(github.ref, 'refs/heads/release/')) }}
      run: 'set -euo pipefail

        touch /tmp/{apple_cert.p12,apple_cert_password.txt,apple_apikey.p8}

        chmod 600 /tmp/{apple_cert.p12,apple_cert_password.txt,apple_apikey.p8}

        echo "$AC_CERTIFICATE_P12_BASE64" | base64 -d > /tmp/apple_cert.p12

        echo "$AC_CERTIFICATE_PASSWORD" > /tmp/apple_cert_password.txt

        echo "$AC_APIKEY_P8_BASE64" | base64 -d > /tmp/apple_apikey.p8

        '
      env:
        AC_CERTIFICATE_P12_BASE64: ${{ secrets.AC_CERTIFICATE_P12_BASE64 }}
        AC_CERTIFICATE_PASSWORD: ${{ secrets.AC_CERTIFICATE_PASSWORD }}
        AC_APIKEY_P8_BASE64: ${{ secrets.AC_APIKEY_P8_BASE64 }}
    - name: Build dylibs
      run: 'set -euxo pipefail

        ./.github/scripts/retry.sh -- go mod download


        make gen/mark-fresh

        make build/coder-dylib

        '
      env:
        CODER_SIGN_DARWIN: ${{ (github.ref == 'refs/heads/main' || startsWith(github.ref,
          'refs/heads/release/')) && '1' || '0' }}
        AC_CERTIFICATE_FILE: /tmp/apple_cert.p12
        AC_CERTIFICATE_PASSWORD_FILE: /tmp/apple_cert_password.txt
    - name: Upload build artifacts
      if: ${{ github.repository_owner == 'coder' && (github.ref == 'refs/heads/main'
        || startsWith(github.ref, 'refs/heads/release/')) }}
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
      with:
        name: dylibs
        path: './build/*.h

          ./build/*.dylib

          '
        retention-days: 7
    - name: Delete Apple Developer certificate and API key
      if: ${{ github.repository_owner == 'coder' && (github.ref == 'refs/heads/main'
        || startsWith(github.ref, 'refs/heads/release/')) }}
      run: rm -f /tmp/{apple_cert.p12,apple_cert_password.txt,apple_apikey.p8}
  check-build:
    needs: changes
    if: needs.changes.outputs.go == 'true' && github.ref != 'refs/heads/main'
