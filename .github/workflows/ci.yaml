name: ci
on:
  workflow_dispatch: {}
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}
jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      docs-only: ${{ steps.filter.outputs.docs_count == steps.filter.outputs.all_count
        }}
      docs: ${{ steps.filter.outputs.docs }}
      go: ${{ steps.filter.outputs.go }}
      site: ${{ steps.filter.outputs.site }}
      k8s: ${{ steps.filter.outputs.k8s }}
      ci: ${{ steps.filter.outputs.ci }}
      db: ${{ steps.filter.outputs.db }}
      gomod: ${{ steps.filter.outputs.gomod }}
      offlinedocs-only: ${{ steps.filter.outputs.offlinedocs_count == steps.filter.outputs.all_count
        }}
      offlinedocs: ${{ steps.filter.outputs.offlinedocs }}
      tailnet-integration: ${{ steps.filter.outputs.tailnet-integration }}
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e
      with:
        egress-policy: audit
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: 1
        persist-credentials: false
    - name: check changed files
      uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36
      id: filter
      with:
        filters: "all:\n  - \"**\"\ndocs:\n  - \"docs/**\"\n  - \"README.md\"\n  -\
          \ \"examples/web-server/**\"\n  - \"examples/monitoring/**\"\n  - \"examples/lima/**\"\
          \ndb:\n  - \"**.sql\"\n  - \"coderd/database/**\"\ngo:\n  - \"**.sql\"\n\
          \  - \"**.go\"\n  - \"**.golden\"\n  - \"go.mod\"\n  - \"go.sum\"\n  # Other\
          \ non-Go files that may affect Go code:\n  - \"**.rego\"\n  - \"**.sh\"\n\
          \  - \"**.tpl\"\n  - \"**.gotmpl\"\n  - \"**.gotpl\"\n  - \"Makefile\"\n\
          \  - \"site/static/error.html\"\n  # Main repo directories for completeness\
          \ in case other files are\n  # touched:\n  - \"agent/**\"\n  - \"cli/**\"\
          \n  - \"cmd/**\"\n  - \"coderd/**\"\n  - \"enterprise/**\"\n  - \"examples/**\"\
          \n  - \"helm/**\"\n  - \"provisioner/**\"\n  - \"provisionerd/**\"\n  -\
          \ \"provisionersdk/**\"\n  - \"pty/**\"\n  - \"scaletest/**\"\n  - \"tailnet/**\"\
          \n  - \"testutil/**\"\ngomod:\n  - \"go.mod\"\n  - \"go.sum\"\nsite:\n \
          \ - \"site/**\"\nk8s:\n  - \"helm/**\"\n  - \"scripts/Dockerfile\"\n  -\
          \ \"scripts/Dockerfile.base\"\n  - \"scripts/helm.sh\"\nci:\n  - \".github/actions/**\"\
          \n  - \".github/workflows/ci.yaml\"\nofflinedocs:\n  - \"offlinedocs/**\"\
          \ntailnet-integration:\n  - \"tailnet/**\"\n  - \"go.mod\"\n  - \"go.sum\"\
          \n"
    - id: debug
      run: 'echo "$FILTER_JSON"

        '
      env:
        FILTER_JSON: ${{ toJSON(steps.filter.outputs) }}
  lint:
    needs: changes
    if: needs.changes.outputs.offlinedocs-only == 'false' || needs.changes.outputs.ci
      == 'true' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e
      with:
        egress-policy: audit
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: 1
        persist-credentials: false
    - name: Setup Node
      uses: ./.github/actions/setup-node
    - name: Setup Go
      uses: ./.github/actions/setup-go
    - name: Get golangci-lint cache dir
      run: 'linter_ver=$(grep -Eo ''GOLANGCI_LINT_VERSION=\S+'' dogfood/coder/Dockerfile
        | cut -d ''='' -f 2)

        ./.github/scripts/retry.sh -- go install "github.com/golangci/golangci-lint/cmd/golangci-lint@v$linter_ver"

        dir=$(golangci-lint cache status | awk ''/Dir/ { print $2 }'')

        echo "LINT_CACHE_DIR=$dir" >> "$GITHUB_ENV"

        '
    - name: golangci-lint cache
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
      with:
        path: '${{ env.LINT_CACHE_DIR }}

          '
        key: golangci-lint-${{ runner.os }}-${{ hashFiles('**/*.go') }}
        restore-keys: 'golangci-lint-${{ runner.os }}-

          '
    - name: Check for typos
      uses: crate-ci/typos@2d0ce569feab1f8752f1dde43cc2f2aa53236e06
      with:
        config: .github/workflows/typos.toml
    - name: Fix the typos
      if: ${{ failure() }}
      run: 'echo "::notice:: you can automatically fix typos from your CLI:

        cargo install typos-cli

        typos -c .github/workflows/typos.toml -w"

        '
    - name: Install helm
      uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4
      with:
        version: v3.9.2
      continue-on-error: true
      id: setup-helm
    - name: Install helm (fallback)
      if: steps.setup-helm.outcome == 'failure'
      run: 'set -euo pipefail

        curl -fsSL https://packages.buildkite.com/helm-linux/helm-debian/gpgkey |
        gpg --dearmor | sudo tee /usr/share/keyrings/helm.gpg > /dev/null

        echo "deb [signed-by=/usr/share/keyrings/helm.gpg] https://packages.buildkite.com/helm-linux/helm-debian/any/
        any main" | sudo tee /etc/apt/sources.list.d/helm-stable-debian.list

        sudo apt-get update

        sudo apt-get install -y helm=3.9.2-1

        '
    - name: Verify helm version
      run: helm version --short
    - name: make lint
      run: make --output-sync=line -j lint
    - name: Check workflow files
      run: 'bash <(curl https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
        1.7.4

        ./actionlint -color -shellcheck= -ignore "set-output"

        '
      shell: bash
    - name: Check for unstaged files
      run: 'rm -f ./actionlint ./typos

        ./scripts/check_unstaged.sh

        '
      shell: bash
  lint-actions:
    needs: changes
    if: needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e
      with:
        egress-policy: audit
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: 1
        persist-credentials: false
    - name: Setup Go
      uses: ./.github/actions/setup-go
    - name: make lint/actions
      run: make --output-sync=line -j lint/actions
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  gen:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    if: ${{ !cancelled() }}
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e
      with:
        egress-policy: audit
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: 1
        persist-credentials: false
    - name: Setup Node
      uses: ./.github/actions/setup-node
    - name: Setup Go
      uses: ./.github/actions/setup-go
    - name: Setup sqlc
      uses: ./.github/actions/setup-sqlc
    - name: Setup Terraform
      uses: ./.github/actions/setup-tf
    - name: go install tools
      uses: ./.github/actions/setup-go-tools
    - name: Install Protoc
      run: 'mkdir -p /tmp/proto

        pushd /tmp/proto

        curl -L -o protoc.zip https://github.com/protocolbuffers/protobuf/releases/download/v23.4/protoc-23.4-linux-x86_64.zip

        unzip protoc.zip

        sudo cp -r ./bin/* /usr/local/bin

        sudo cp -r ./include /usr/local/bin/include

        popd

        '
    - name: make gen
      timeout-minutes: 8
      run: '# Remove golden files to detect discrepancy in generated files.

        make clean/golden-files

        # Notifications require DB, we could start a DB instance here but

        # let''s just restore for now.

        git checkout -- coderd/notifications/testdata/rendered-templates

        # no `-j` flag as `make` fails with:

        # coderd/rbac/object_gen.go:1:1: syntax error: package statement must be first

        make --output-sync -B gen

        '
    - name: Check for unstaged files
      run: ./scripts/check_unstaged.sh
  fmt:
    needs: changes
    if: needs.changes.outputs.offlinedocs-only == 'false' || needs.changes.outputs.ci
      == 'true' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e
      with:
        egress-policy: audit
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: 1
        persist-credentials: false
    - name: Setup Node
      uses: ./.github/actions/setup-node
    - name: Check Go version
      run: IGNORE_NIX=true ./scripts/check_go_versions.sh
    - name: Setup Go
      uses: ./.github/actions/setup-go
    - name: Install shfmt
      run: ./.github/scripts/retry.sh -- go install mvdan.cc/sh/v3/cmd/shfmt@v3.7.0
    - name: make fmt
      timeout-minutes: 7
      run: "PATH=\"${PATH}:$(go env GOPATH)/bin\" \\\n  make --output-sync -j -B fmt\n"
    - name: Check for unstaged files
      run: ./scripts/check_unstaged.sh
  test-go-pg:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.go == 'true' || needs.changes.outputs.ci == 'true' ||
      github.ref == 'refs/heads/main'
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os:
        - ubuntu-latest
        - macos-latest
        - windows-2022
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e
      with:
        egress-policy: audit
    - name: Disable Spotlight Indexing
      if: runner.os == 'macOS'
      run: "enabled=$(sudo mdutil -a -s | { grep -Fc \"Indexing enabled\" || true;\
        \ })\nif [ \"$enabled\" -eq 0 ]; then\n  echo \"Spotlight indexing is already\
        \ disabled\"\n  exit 0\nfi\nsudo mdutil -a -i off\nsudo mdutil -X /\nsudo\
        \ launchctl bootout system /System/Library/LaunchDaemons/com.apple.metadata.mds.plist\n"
    - name: Setup RAM Disks
      if: runner.os == 'Windows'
      uses: coder/setup-ramdisk-action@e1100847ab2d7bcd9d14bcda8f2d1b0f07b36f1b
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: 1
        persist-credentials: false
    - name: Setup Go Paths
      id: go-paths
      uses: ./.github/actions/setup-go-paths
    - name: Setup GNU tools (macOS)
      uses: ./.github/actions/setup-gnu-tools
    - name: Setup Go
      uses: ./.github/actions/setup-go
      with:
        use-preinstalled-go: ${{ runner.os == 'Windows' }}
        use-cache: true
    - name: Setup Terraform
      uses: ./.github/actions/setup-tf
    - name: Download Test Cache
      id: download-cache
      uses: ./.github/actions/test-cache/download
      with:
        key-prefix: test-go-pg-${{ runner.os }}-${{ runner.arch }}
    - name: Setup Embedded Postgres Cache Paths
      id: embedded-pg-cache
      uses: ./.github/actions/setup-embedded-pg-cache-paths
    - name: Download Embedded Postgres Cache
      id: download-embedded-pg-cache
      uses: ./.github/actions/embedded-pg-cache/download
      with:
        key-prefix: embedded-pg-${{ runner.os }}-${{ runner.arch }}
        cache-path: ${{ steps.embedded-pg-cache.outputs.cached-dirs }}
    - name: Normalize File and Directory Timestamps
      shell: bash
      run: 'find . -type f ! -path ./.git/\*\* | mtimehash

        find . -type d ! -path ./.git/\*\* -exec touch -t 200601010000 {} +

        '
    - name: Normalize Terraform Path for Caching
      shell: bash
      run: 'mkdir -p "$RUNNER_TEMP/sym"

        source scripts/normalize_path.sh

        normalize_path_with_symlinks "$RUNNER_TEMP/sym" "$(dirname "$(which terraform)")"

        '
    - name: Setup RAM disk for Embedded Postgres (Windows)
      if: runner.os == 'Windows'
      shell: bash
      run: mkdir -p "R:/temp/embedded-pg"
    - name: Setup RAM disk for Embedded Postgres (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: '# Postgres runs faster on a ramdisk on macOS.

        mkdir -p /tmp/tmpfs

        sudo mount_tmpfs -o noowners -s 8g /tmp/tmpfs


        # Install google-chrome for scaletests.

        # As another concern, should we really have this kind of external dependency

        # requirement on standard CI?

        brew install google-chrome


        # macOS will output "The default interactive shell is now zsh" intermittently
        in CI.

        touch ~/.bash_profile && echo "export BASH_SILENCE_DEPRECATION_WARNING=1"
        >> ~/.bash_profile

        '
    - name: Increase PTY limit (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: '# Increase PTY limit to avoid exhaustion during tests.

        # Default is 511; 999 is the maximum value on CI runner.

        sudo sysctl -w kern.tty.ptmx_max=999

        '
    - name: Test with PostgreSQL Database (Linux)
      if: runner.os == 'Linux'
      uses: ./.github/actions/test-go-pg
      with:
        postgres-version: '13'
        test-parallelism-packages: '8'
        test-parallelism-tests: '8'
        test-count: ${{ github.ref == 'refs/heads/main' && '1' || '' }}
    - name: Test with PostgreSQL Database (macOS)
      if: runner.os == 'macOS'
      uses: ./.github/actions/test-go-pg
      with:
        postgres-version: '13'
        test-parallelism-packages: '8'
        test-parallelism-tests: '16'
        test-count: ${{ github.ref == 'refs/heads/main' && '1' || '' }}
        test-packages: ./cli/... ./enterprise/cli/... ./agent/...
        embedded-pg-path: /tmp/tmpfs/embedded-pg
        embedded-pg-cache: ${{ steps.embedded-pg-cache.outputs.embedded-pg-cache }}
    - name: Test with PostgreSQL Database (Windows)
      if: runner.os == 'Windows'
      uses: ./.github/actions/test-go-pg
      with:
        postgres-version: '13'
        test-parallelism-packages: '8'
        test-parallelism-tests: '16'
        test-count: ${{ github.ref == 'refs/heads/main' && '1' || '' }}
        test-packages: ./cli/... ./enterprise/cli/... ./agent/...
        embedded-pg-path: R:/temp/embedded-pg
        embedded-pg-cache: ${{ steps.embedded-pg-cache.outputs.embedded-pg-cache }}
    - name: Upload failed test db dumps
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
      with:
        name: failed-test-db-dump-${{matrix.os}}
        path: '**/*.test.sql'
    - name: Upload Test Cache
      uses: ./.github/actions/test-cache/upload
      with:
        cache-key: ${{ steps.download-cache.outputs.cache-key }}
    - name: Upload Embedded Postgres Cache
      uses: ./.github/actions/embedded-pg-cache/upload
      if: runner.OS == 'macOS' || runner.OS == 'Windows'
      with:
        cache-key: ${{ steps.download-embedded-pg-cache.outputs.cache-key }}
        cache-path: ${{ steps.embedded-pg-cache.outputs.embedded-pg-cache }}
    - name: Upload test stats to Datadog
      timeout-minutes: 1
      continue-on-error: true
      uses: ./.github/actions/upload-datadog
      if: success() || failure()
      with:
        api-key: ${{ secrets.DATADOG_API_KEY }}
  test-go-pg-17:
    runs-on: ubuntu-latest
    needs:
    - changes
    if: needs.changes.outputs.go == 'true' || needs.changes.outputs.ci == 'true' ||
      github.ref == 'refs/heads/main'
    timeout-minutes: 25
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e
      with:
        egress-policy: audit
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: 1
        persist-credentials: false
    - name: Setup Go
      uses: ./.github/actions/setup-go
    - name: Setup Terraform
      uses: ./.github/actions/setup-tf
    - name: Download Test Cache
      id: download-cache
      uses: ./.github/actions/test-cache/download
      with:
        key-prefix: test-go-pg-17-${{ runner.os }}-${{ runner.arch }}
    - name: Normalize Terraform Path for Caching
      shell: bash
      run: 'mkdir -p "$RUNNER_TEMP/sym"

        source scripts/normalize_path.sh

        normalize_path_with_symlinks "$RUNNER_TEMP/sym" "$(dirname "$(which terraform)")"

        '
    - name: Test with PostgreSQL Database
      uses: ./.github/actions/test-go-pg
      with:
        postgres-version: '17'
        test-parallelism-packages: '8'
        test-parallelism-tests: '8'
        test-count: ${{ github.ref == 'refs/heads/main' && '1' || '' }}
    - name: Upload Test Cache
      uses: ./.github/actions/test-cache/upload
      with:
        cache-key: ${{ steps.download-cache.outputs.cache-key }}
    - name: Upload test stats to Datadog
      timeout-minutes: 1
      continue-on-error: true
      uses: ./.github/actions/upload-datadog
      if: success() || failure()
      with:
        api-key: ${{ secrets.DATADOG_API_KEY }}
  test-go-race-pg:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.go == 'true' || needs.changes.outputs.ci == 'true' ||
      github.ref == 'refs/heads/main'
    timeout-minutes: 25
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e
      with:
        egress-policy: audit
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: 1
        persist-credentials: false
    - name: Setup Go
      uses: ./.github/actions/setup-go
    - name: Setup Terraform
      uses: ./.github/actions/setup-tf
    - name: Download Test Cache
      id: download-cache
      uses: ./.github/actions/test-cache/download
      with:
        key-prefix: test-go-race-pg-${{ runner.os }}-${{ runner.arch }}
    - name: Normalize Terraform Path for Caching
      shell: bash
      run: 'mkdir -p "$RUNNER_TEMP/sym"

        source scripts/normalize_path.sh

        normalize_path_with_symlinks "$RUNNER_TEMP/sym" "$(dirname "$(which terraform)")"

        '
    - name: Run Tests
      uses: ./.github/actions/test-go-pg
      with:
        postgres-version: '17'
        test-parallelism-packages: '4'
        test-parallelism-tests: '4'
        race-detection: true
    - name: Upload Test Cache
      uses: ./.github/actions/test-cache/upload
      with:
        cache-key: ${{ steps.download-cache.outputs.cache-key }}
    - name: Upload test stats to Datadog
      timeout-minutes: 1
      continue-on-error: true
      uses: ./.github/actions/upload-datadog
      if: always()
      with:
        api-key: ${{ secrets.DATADOG_API_KEY }}
  test-go-tailnet-integration:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.tailnet-integration == 'true' || needs.changes.outputs.ci
      == 'true'
    timeout-minutes: 20
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e
      with:
        egress-policy: audit
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: 1
        persist-credentials: false
    - name: Setup Go
      uses: ./.github/actions/setup-go
    - name: Install Nginx
      run: sudo apt-get update && sudo apt-get install -y nginx
    - name: Run Tests
      run: make test-tailnet-integration
  test-js:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.site == 'true' || needs.changes.outputs.ci == 'true'
      || github.ref == 'refs/heads/main'
    timeout-minutes: 20
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e
      with:
        egress-policy: audit
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: 1
        persist-credentials: false
    - name: Setup Node
      uses: ./.github/actions/setup-node
    - run: pnpm test:ci --max-workers "$(nproc)"
      working-directory: site
  test-e2e:
    runs-on: ubuntu-latest
    needs: changes
    strategy:
      fail-fast: false
      matrix:
        variant:
        - premium: false
          name: test-e2e
    if: (needs.changes.outputs.go == 'true' || needs.changes.outputs.site == 'true'
      || needs.changes.outputs.ci == 'true' || github.ref == 'refs/heads/main') &&
      !(github.event.pull_request.head.repo.fork)
    timeout-minutes: 20
    name: ${{ matrix.variant.name }}
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e
      with:
        egress-policy: audit
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: 1
        persist-credentials: false
    - name: Setup Node
      uses: ./.github/actions/setup-node
    - name: Setup Go
      uses: ./.github/actions/setup-go
    - run: make gen/mark-fresh
      name: make gen
    - run: make site/e2e/bin/coder
      name: make coder
    - run: pnpm build
      env:
        NODE_OPTIONS: ${{ github.repository_owner == 'coder' && '--max_old_space_size=8192'
          || '' }}
      working-directory: site
    - run: pnpm playwright:install
      working-directory: site
    - run: pnpm playwright:test --forbid-only --workers 1
      if: ${{ !matrix.variant.premium }}
      env:
        DEBUG: pw:api
      working-directory: site
    - run: pnpm playwright:test --forbid-only --workers 1
      if: ${{ matrix.variant.premium }}
      env:
        DEBUG: pw:api
        CODER_E2E_LICENSE: ${{ secrets.CODER_E2E_LICENSE }}
        CODER_E2E_REQUIRE_PREMIUM_TESTS: '1'
      working-directory: site
    - name: Upload Playwright Failed Tests
      if: always() && github.actor != 'dependabot[bot]' && runner.os == 'Linux' &&
        !github.event.pull_request.head.repo.fork
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
      with:
        name: failed-test-videos${{ matrix.variant.premium && '-premium' || '' }}
        path: ./site/test-results/**/*.webm
        retention-days: 7
    - name: Upload debug log
      if: always() && github.actor != 'dependabot[bot]' && runner.os == 'Linux' &&
