name: Stale Issue, Branch and Old Workflows Cleanup
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e
      with:
        egress-policy: audit
    - name: stale
      uses: actions/stale@b5d41d4e1d5dceea10e7104786b73624c18a190f
      with:
        stale-issue-label: stale
        stale-pr-label: stale
        days-before-stale: 3650
        days-before-pr-stale: 7
        days-before-pr-close: 3
        stale-pr-message: ''
        stale-issue-message: ''
        operations-per-run: 60
        ascending: true
    - name: Close old issues labeled likely-no
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: "const thirtyDaysAgo = new Date(new Date().setDate(new Date().getDate()\
          \ - 30));\nconsole.log(`Looking for issues labeled with 'likely-no' more\
          \ than 30 days ago, which is after ${thirtyDaysAgo.toISOString()}`);\n\n\
          const issues = await github.rest.issues.listForRepo({\n  owner: context.repo.owner,\n\
          \  repo: context.repo.repo,\n  labels: 'likely-no',\n  state: 'open',\n\
          });\n\nconsole.log(`Found ${issues.data.length} open issues labeled with\
          \ 'likely-no'`);\n\nfor (const issue of issues.data) {\n  console.log(`Checking\
          \ issue #${issue.number} created at ${issue.created_at}`);\n\n  const timeline\
          \ = await github.rest.issues.listEventsForTimeline({\n    owner: context.repo.owner,\n\
          \    repo: context.repo.repo,\n    issue_number: issue.number,\n  });\n\n\
          \  const labelEvent = timeline.data.find(event => event.event === 'labeled'\
          \ && event.label.name === 'likely-no');\n\n  if (labelEvent) {\n    console.log(`Issue\
          \ #${issue.number} was labeled with 'likely-no' at ${labelEvent.created_at}`);\n\
          \n    if (new Date(labelEvent.created_at) < thirtyDaysAgo) {\n      console.log(`Issue\
          \ #${issue.number} is older than 30 days with 'likely-no' label, closing\
          \ issue.`);\n      await github.rest.issues.update({\n        owner: context.repo.owner,\n\
          \        repo: context.repo.repo,\n        issue_number: issue.number,\n\
          \        state: 'closed',\n        state_reason: 'not_planned'\n      });\n\
          \    }\n  } else {\n    console.log(`Issue #${issue.number} does not have\
          \ a 'likely-no' label event in its timeline.`);\n  }\n}\n"
  branches:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e
      with:
        egress-policy: audit
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        persist-credentials: false
    - name: Run delete-old-branches-action
      uses: beatlabs/delete-old-branches-action@4eeeb8740ff8b3cb310296ddd6b43c3387734588
      with:
        repo_token: ${{ github.token }}
        date: 6 months ago
        dry_run: false
        delete_tags: false
        exclude_open_pr_branches: true
  del_runs:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e
      with:
        egress-policy: audit
    - name: Delete PR Cleanup workflow runs
      uses: Mattraks/delete-workflow-runs@5bf9a1dac5c4d041c029f0a8370ddf0c5cb5aeb7
      with:
        token: ${{ github.token }}
        repository: ${{ github.repository }}
        retain_days: 30
        keep_minimum_runs: 30
        delete_workflow_pattern: pr-cleanup.yaml
    - name: Delete PR Deploy workflow skipped runs
      uses: Mattraks/delete-workflow-runs@5bf9a1dac5c4d041c029f0a8370ddf0c5cb5aeb7
      with:
        token: ${{ github.token }}
        repository: ${{ github.repository }}
        retain_days: 30
        keep_minimum_runs: 30
        delete_workflow_pattern: pr-deploy.yaml
