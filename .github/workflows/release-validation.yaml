name: release-validation
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  network-performance:
    runs-on: ubuntu-latest
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e
      with:
        egress-policy: audit
    - name: Run Schmoder CI
      uses: benc-uk/workflow-dispatch@e2e5e9a103e331dad343f381a29e654aea3cf8fc
      with:
        workflow: ci.yaml
        repo: coder/schmoder
        inputs: '{ "num_releases": "3", "commit": "${{ github.sha }}" }'
        token: ${{ secrets.CDRCI_SCHMODER_ACTIONS_TOKEN }}
        ref: main
