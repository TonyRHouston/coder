name: PR Auto Assign
on:
  workflow_dispatch: {}
permissions:
  pull-requests: write
jobs:
  assign-author:
    runs-on: ubuntu-latest
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e
      with:
        egress-policy: audit
    - name: Assign author
      uses: toshimaru/auto-author-assign@4d585cc37690897bd9015942ed6e766aa7cdb97f
