name: Release
on:
  workflow_dispatch:
    inputs:
      release_channel:
        type: choice
        description: Release channel
        options:
        - mainline
        - stable
      release_notes:
        description: Release notes for the publishing the release. This is required
          to create a release.
      dry_run:
        description: Perform a dry-run release (devel). Note that ref must be an annotated
          tag when run without dry-run.
        type: boolean
        required: true
        default: false
permissions:
  contents: read
concurrency: ${{ github.workflow }}-${{ github.ref }}
env:
  CODER_RELEASE: ${{ !inputs.dry_run }}
  CODER_DRY_RUN: ${{ inputs.dry_run }}
  CODER_RELEASE_CHANNEL: ${{ inputs.release_channel }}
  CODER_RELEASE_NOTES: ${{ inputs.release_notes }}
jobs:
  check-perms:
    runs-on: ubuntu-latest
    steps:
    - name: Allow only maintainers/admins
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: "const {data} = await github.rest.repos.getCollaboratorPermissionLevel({\n\
          \  owner: context.repo.owner,\n  repo: context.repo.repo,\n  username: context.actor\n\
          });\nconst role = data.role_name || data.user?.role_name || data.permission;\n\
          const perms = data.user?.permissions || {};\ncore.info(`Actor ${context.actor}\
          \ permission=${data.permission}, role_name=${role}`);\n\nconst allowed =\n\
          \  role === 'admin' ||\n  role === 'maintain' ||\n  perms.admin === true\
          \ ||\n  perms.maintain === true;\n\nif (!allowed) core.setFailed('Denied:\
          \ requires maintain or admin');\n"
  build-dylib:
    runs-on: ubuntu-latest
    needs: check-perms
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: 0
        persist-credentials: false
    - name: Fetch git tags
      run: git fetch --tags --force
    - name: Setup build tools
      run: "brew install bash gnu-getopt make\n{\n  echo \"$(brew --prefix bash)/bin\"\
        \n  echo \"$(brew --prefix gnu-getopt)/bin\"\n  echo \"$(brew --prefix make)/libexec/gnubin\"\
        \n} >> \"$GITHUB_PATH\"\n"
    - name: Switch XCode Version
      uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd
      with:
        xcode-version: 16.1.0
    - name: Setup Go
      uses: ./.github/actions/setup-go
    - name: Install rcodesign
      run: "set -euo pipefail\nwget -O /tmp/rcodesign.tar.gz https://github.com/indygreg/apple-platform-rs/releases/download/apple-codesign%2F0.22.0/apple-codesign-0.22.0-macos-universal.tar.gz\n\
        sudo tar -xzf /tmp/rcodesign.tar.gz \\\n  -C /usr/local/bin \\\n  --strip-components=1\
        \ \\\n  apple-codesign-0.22.0-macos-universal/rcodesign\nrm /tmp/rcodesign.tar.gz\n"
    - name: Setup Apple Developer certificate and API key
      run: 'set -euo pipefail

        touch /tmp/{apple_cert.p12,apple_cert_password.txt,apple_apikey.p8}

        chmod 600 /tmp/{apple_cert.p12,apple_cert_password.txt,apple_apikey.p8}

        echo "$AC_CERTIFICATE_P12_BASE64" | base64 -d > /tmp/apple_cert.p12

        echo "$AC_CERTIFICATE_PASSWORD" > /tmp/apple_cert_password.txt

        echo "$AC_APIKEY_P8_BASE64" | base64 -d > /tmp/apple_apikey.p8

        '
      env:
        AC_CERTIFICATE_P12_BASE64: ${{ secrets.AC_CERTIFICATE_P12_BASE64 }}
        AC_CERTIFICATE_PASSWORD: ${{ secrets.AC_CERTIFICATE_PASSWORD }}
        AC_APIKEY_P8_BASE64: ${{ secrets.AC_APIKEY_P8_BASE64 }}
    - name: Build dylibs
      run: 'set -euxo pipefail

        go mod download


        make gen/mark-fresh

        make build/coder-dylib

        '
      env:
        CODER_SIGN_DARWIN: 1
        AC_CERTIFICATE_FILE: /tmp/apple_cert.p12
        AC_CERTIFICATE_PASSWORD_FILE: /tmp/apple_cert_password.txt
    - name: Upload build artifacts
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
      with:
        name: dylibs
        path: './build/*.h

          ./build/*.dylib

          '
        retention-days: 7
    - name: Delete Apple Developer certificate and API key
      run: rm -f /tmp/{apple_cert.p12,apple_cert_password.txt,apple_apikey.p8}
  release:
    name: Build and publish
    needs:
    - build-dylib
    - check-perms
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
    env:
      DOCKER_CLI_EXPERIMENTAL: enabled
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@20cf305ff2072d973412fa9b1e3a4f227bda3c76
      with:
        egress-policy: audit
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: 0
        persist-credentials: false
    - name: Fetch git tags
      run: git fetch --tags --force
    - name: Print version
      id: version
      run: 'set -euo pipefail

        version="$(./scripts/version.sh)"

        echo "version=$version" >> "$GITHUB_OUTPUT"

        # Speed up future version.sh calls.

        echo "CODER_FORCE_VERSION=$version" >> "$GITHUB_ENV"

        echo "$version"

        '
    - name: Verify release input
      if: ${{ !inputs.dry_run }}
      run: "set -euo pipefail\n\nif [[ \"${GITHUB_REF}\" != \"refs/tags/v\"* ]]; then\n\
        \  echo \"Ref must be a semver tag when creating a release, did you use scripts/release.sh?\"\
        \n  exit 1\nfi\n\n# 2.10.2 -> release/2.10\nversion=\"$(./scripts/version.sh)\"\
        \nrelease_branch=release/${version%.*}\nbranch_contains_tag=$(git branch --remotes\
        \ --contains \"${GITHUB_REF}\" --list \"*/${release_branch}\" --format='%(refname)')\n\
        if [[ -z \"${branch_contains_tag}\" ]]; then\n  echo \"Ref tag must exist\
        \ in a branch named ${release_branch} when creating a release, did you use\
        \ scripts/release.sh?\"\n  exit 1\nfi\n\nif [[ -z \"${CODER_RELEASE_NOTES}\"\
        \ ]]; then\n  echo \"Release notes are required to create a release, did you\
        \ use scripts/release.sh?\"\n  exit 1\nfi\n\necho \"Release inputs verified:\"\
        \necho\necho \"- Ref: ${GITHUB_REF}\"\necho \"- Version: ${version}\"\necho\
        \ \"- Release channel: ${CODER_RELEASE_CHANNEL}\"\necho \"- Release branch:\
        \ ${release_branch}\"\necho \"- Release notes: true\"\n"
    - name: Create release notes file
      run: 'set -euo pipefail


        release_notes_file="$(mktemp -t release_notes.XXXXXX)"

        echo "$CODER_RELEASE_NOTES" > "$release_notes_file"

        echo CODER_RELEASE_NOTES_FILE="$release_notes_file" >> "$GITHUB_ENV"

        '
    - name: Show release notes
      run: 'set -euo pipefail

        cat "$CODER_RELEASE_NOTES_FILE"

        '
    - name: Docker Login
      uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Setup Go
      uses: ./.github/actions/setup-go
    - name: Setup Node
      uses: ./.github/actions/setup-node
    - name: Setup Java
      uses: actions/setup-java@f2beeb24e141e01a676f977032f5a29d81c9e27e
      with:
        distribution: zulu
        java-version: '11.0'
    - name: Install go-winres
      run: go install github.com/tc-hib/go-winres@d743268d7ea168077ddd443c4240562d4f5e8c3e
    - name: Install nsis and zstd
      run: sudo apt-get install -y nsis zstd
    - name: Install nfpm
      run: 'set -euo pipefail

        wget -O /tmp/nfpm.deb https://github.com/goreleaser/nfpm/releases/download/v2.35.1/nfpm_2.35.1_amd64.deb

        sudo dpkg -i /tmp/nfpm.deb

        rm /tmp/nfpm.deb

        '
    - name: Install rcodesign
      run: "set -euo pipefail\nwget -O /tmp/rcodesign.tar.gz https://github.com/indygreg/apple-platform-rs/releases/download/apple-codesign%2F0.22.0/apple-codesign-0.22.0-x86_64-unknown-linux-musl.tar.gz\n\
        sudo tar -xzf /tmp/rcodesign.tar.gz \\\n  -C /usr/bin \\\n  --strip-components=1\
        \ \\\n  apple-codesign-0.22.0-x86_64-unknown-linux-musl/rcodesign\nrm /tmp/rcodesign.tar.gz\n"
    - name: Install cosign
      uses: ./.github/actions/install-cosign
    - name: Install syft
      uses: ./.github/actions/install-syft
    - name: Setup Apple Developer certificate and API key
      run: 'set -euo pipefail

        touch /tmp/{apple_cert.p12,apple_cert_password.txt,apple_apikey.p8}

        chmod 600 /tmp/{apple_cert.p12,apple_cert_password.txt,apple_apikey.p8}

        echo "$AC_CERTIFICATE_P12_BASE64" | base64 -d > /tmp/apple_cert.p12

        echo "$AC_CERTIFICATE_PASSWORD" > /tmp/apple_cert_password.txt

        echo "$AC_APIKEY_P8_BASE64" | base64 -d > /tmp/apple_apikey.p8

        '
      env:
        AC_CERTIFICATE_P12_BASE64: ${{ secrets.AC_CERTIFICATE_P12_BASE64 }}
        AC_CERTIFICATE_PASSWORD: ${{ secrets.AC_CERTIFICATE_PASSWORD }}
        AC_APIKEY_P8_BASE64: ${{ secrets.AC_APIKEY_P8_BASE64 }}
    - name: Setup Windows EV Signing Certificate
      run: 'set -euo pipefail

        touch /tmp/ev_cert.pem

        chmod 600 /tmp/ev_cert.pem

        echo "$EV_SIGNING_CERT" > /tmp/ev_cert.pem

        wget https://github.com/ebourg/jsign/releases/download/6.0/jsign-6.0.jar -O
        /tmp/jsign-6.0.jar

        '
      env:
        EV_SIGNING_CERT: ${{ secrets.EV_SIGNING_CERT }}
    - name: Test migrations from current ref to main
      run: 'POSTGRES_VERSION=13 make test-migrations

        '
    - name: Authenticate to Google Cloud
      id: gcloud_auth
      uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093
      with:
        workload_identity_provider: ${{ vars.GCP_CODE_SIGNING_WORKLOAD_ID_PROVIDER
          }}
        service_account: ${{ vars.GCP_CODE_SIGNING_SERVICE_ACCOUNT }}
        token_format: access_token
    - name: Setup GCloud SDK
      uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db
    - name: Download dylibs
      uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131
      with:
        name: dylibs
        path: ./build
    - name: Insert dylibs
      run: 'mv ./build/*amd64.dylib ./site/out/bin/coder-vpn-darwin-amd64.dylib

        mv ./build/*arm64.dylib ./site/out/bin/coder-vpn-darwin-arm64.dylib

        mv ./build/*arm64.h     ./site/out/bin/coder-vpn-darwin-dylib.h

        '
    - name: Build binaries
      run: "set -euo pipefail\ngo mod download\n\nversion=\"$(./scripts/version.sh)\"\
        \nmake gen/mark-fresh\nmake -j \\\n  build/coder_\"$version\"_linux_{amd64,armv7,arm64}.{tar.gz,apk,deb,rpm}\
        \ \\\n  build/coder_\"$version\"_{darwin,windows}_{amd64,arm64}.zip \\\n \
        \ build/coder_\"$version\"_windows_amd64_installer.exe \\\n  build/coder_helm_\"\
        $version\".tgz \\\n  build/provisioner_helm_\"$version\".tgz\n"
      env:
        CODER_SIGN_WINDOWS: '1'
        CODER_SIGN_DARWIN: '1'
        CODER_SIGN_GPG: '1'
        CODER_GPG_RELEASE_KEY_BASE64: ${{ secrets.GPG_RELEASE_KEY_BASE64 }}
        CODER_WINDOWS_RESOURCES: '1'
        AC_CERTIFICATE_FILE: /tmp/apple_cert.p12
        AC_CERTIFICATE_PASSWORD_FILE: /tmp/apple_cert_password.txt
        AC_APIKEY_ISSUER_ID: ${{ secrets.AC_APIKEY_ISSUER_ID }}
        AC_APIKEY_ID: ${{ secrets.AC_APIKEY_ID }}
        AC_APIKEY_FILE: /tmp/apple_apikey.p8
        EV_KEY: ${{ secrets.EV_KEY }}
        EV_KEYSTORE: ${{ secrets.EV_KEYSTORE }}
        EV_TSA_URL: ${{ secrets.EV_TSA_URL }}
        EV_CERTIFICATE_PATH: /tmp/ev_cert.pem
        GCLOUD_ACCESS_TOKEN: ${{ steps.gcloud_auth.outputs.access_token }}
        JSIGN_PATH: /tmp/jsign-6.0.jar
    - name: Delete Apple Developer certificate and API key
      run: rm -f /tmp/{apple_cert.p12,apple_cert_password.txt,apple_apikey.p8}
    - name: Delete Windows EV Signing Cert
      run: rm /tmp/ev_cert.pem
    - name: Determine base image tag
      id: image-base-tag
      run: "set -euo pipefail\nif [[ \"${CODER_RELEASE:-}\" != *t* ]] || [[ \"${CODER_DRY_RUN:-}\"\
        \ == *t* ]]; then\n  # Empty value means use the default and avoid building\
        \ a fresh one.\n  echo \"tag=\" >> \"$GITHUB_OUTPUT\"\nelse\n  echo \"tag=$(CODER_IMAGE_BASE=ghcr.io/coder/coder-base\
        \ ./scripts/image_tag.sh)\" >> \"$GITHUB_OUTPUT\"\nfi\n"
    - name: Create empty base-build-context directory
      if: steps.image-base-tag.outputs.tag != ''
      run: mkdir base-build-context
    - name: Install depot.dev CLI
      if: steps.image-base-tag.outputs.tag != ''
      uses: depot/setup-action@b0b1ea4f69e92ebf5dea3f8713a1b0c37b2126a5
    - name: Build base Docker image via depot.dev
      if: steps.image-base-tag.outputs.tag != ''
      uses: depot/build-push-action@9785b135c3c76c33db102e45be96a25ab55cd507
      with:
        project: wl5hnrrkns
        context: base-build-context
        file: scripts/Dockerfile.base
        platforms: linux/amd64,linux/arm64,linux/arm/v7
        provenance: true
        sbom: true
        pull: true
        no-cache: true
        push: true
        tags: '${{ steps.image-base-tag.outputs.tag }}

          '
    - name: Verify that images are pushed properly
      if: steps.image-base-tag.outputs.tag != ''
      run: "# retry 10 times with a 5 second delay as the images may not be\n# available\
        \ immediately\nfor i in {1..10}; do\n  rc=0\n  raw_manifests=$(docker buildx\
        \ imagetools inspect --raw \"${IMAGE_TAG}\") || rc=$?\n  if [[ \"$rc\" -eq\
        \ 0 ]]; then\n    break\n  fi\n  if [[ \"$i\" -eq 10 ]]; then\n    echo \"\
        Failed to pull manifests after 10 retries\"\n    exit 1\n  fi\n  echo \"Failed\
        \ to pull manifests, retrying in 5 seconds\"\n  sleep 5\ndone\n\nmanifests=$(\n\
        \  echo \"$raw_manifests\" | \\\n    jq -r '.manifests[].platform | .os +\
        \ \"/\" + .architecture + (if .variant then \"/\" + .variant else \"\" end)'\n\
        )\n\n# Verify all 3 platforms are present.\nset -euxo pipefail\necho \"$manifests\"\
        \ | grep -q linux/amd64\necho \"$manifests\" | grep -q linux/arm64\necho \"\
        $manifests\" | grep -q linux/arm/v7\n"
      env:
        IMAGE_TAG: ${{ steps.image-base-tag.outputs.tag }}
    - name: GitHub Attestation for Base Docker image
      id: attest_base
      if: ${{ !inputs.dry_run && steps.image-base-tag.outputs.tag != '' }}
      continue-on-error: true
      uses: actions/attest@7667f588f2f73a90cea6c7ac70e78266c4f76616
      with:
        subject-name: ${{ steps.image-base-tag.outputs.tag }}
        predicate-type: https://slsa.dev/provenance/v1
        predicate: "{\n  \"buildType\": \"https://github.com/actions/runner-images/\"\
          ,\n  \"builder\": {\n    \"id\": \"https://github.com/${{ github.repository\
          \ }}/actions/runs/${{ github.run_id }}\"\n  },\n  \"invocation\": {\n  \
          \  \"configSource\": {\n      \"uri\": \"git+https://github.com/${{ github.repository\
          \ }}@${{ github.ref }}\",\n      \"digest\": {\n        \"sha1\": \"${{\
          \ github.sha }}\"\n      },\n      \"entryPoint\": \".github/workflows/release.yaml\"\
          \n    },\n    \"environment\": {\n      \"github_workflow\": \"${{ github.workflow\
          \ }}\",\n      \"github_run_id\": \"${{ github.run_id }}\"\n    }\n  },\n\
          \  \"metadata\": {\n    \"buildInvocationID\": \"${{ github.run_id }}\"\
          ,\n    \"completeness\": {\n      \"environment\": true,\n      \"materials\"\
          : true\n    }\n  }\n}\n"
        push-to-registry: true
    - name: Build Linux Docker images
      id: build_docker
      run: "set -euxo pipefail\n\n# we can't build multi-arch if the images aren't\
        \ pushed, so quit now\n# if dry-running\nif [[ \"$CODER_RELEASE\" != *t* ]];\
        \ then\n  echo Skipping multi-arch docker builds due to dry-run.\n  exit 0\n\
        fi\n\n# build Docker images for each architecture\nversion=\"$(./scripts/version.sh)\"\
        \nmake build/coder_\"$version\"_linux_{amd64,arm64,armv7}.tag\n\n# build and\
        \ push multi-arch manifest, this depends on the other images\n# being pushed\
        \ so will automatically push them.\nmake push/build/coder_\"$version\"_linux.tag\n\
        \n# Save multiarch image tag for attestation\nmultiarch_image=\"$(./scripts/image_tag.sh)\"\
        \necho \"multiarch_image=${multiarch_image}\" >> \"$GITHUB_OUTPUT\"\n\n# For\
        \ debugging, print all docker image tags\ndocker images\n\n# if the current\
        \ version is equal to the highest (according to semver)\n# version in the\
        \ repo, also create a multi-arch image as \":latest\" and\n# push it\nif [[\
        \ \"$(git tag | grep '^v' | grep -vE '(rc|dev|-|\\+|\\/)' | sort -r --version-sort\
        \ | head -n1)\" == \"v$(./scripts/version.sh)\" ]]; then\n  # shellcheck disable=SC2046\n\
        \  ./scripts/build_docker_multiarch.sh \\\n    --push \\\n    --target \"\
        $(./scripts/image_tag.sh --version latest)\" \\\n    $(cat build/coder_\"\
        $version\"_linux_{amd64,arm64,armv7}.tag)\n  echo \"created_latest_tag=true\"\
        \ >> \"$GITHUB_OUTPUT\"\nelse\n  echo \"created_latest_tag=false\" >> \"$GITHUB_OUTPUT\"\
        \nfi\n"
      env:
        CODER_BASE_IMAGE_TAG: ${{ steps.image-base-tag.outputs.tag }}
    - name: SBOM Generation and Attestation
      if: ${{ !inputs.dry_run }}
      env:
        COSIGN_EXPERIMENTAL: '1'
        MULTIARCH_IMAGE: ${{ steps.build_docker.outputs.multiarch_image }}
        VERSION: ${{ steps.version.outputs.version }}
        CREATED_LATEST_TAG: ${{ steps.build_docker.outputs.created_latest_tag }}
      run: "set -euxo pipefail\n\n# Generate SBOM for multi-arch image with version\
        \ in filename\necho \"Generating SBOM for multi-arch image: ${MULTIARCH_IMAGE}\"\
        \nsyft \"${MULTIARCH_IMAGE}\" -o spdx-json > \"coder_${VERSION}_sbom.spdx.json\"\
        \n\n# Attest SBOM to multi-arch image\necho \"Attesting SBOM to multi-arch\
        \ image: ${MULTIARCH_IMAGE}\"\ncosign clean --force=true \"${MULTIARCH_IMAGE}\"\
        \ncosign attest --type spdxjson \\\n  --predicate \"coder_${VERSION}_sbom.spdx.json\"\
        \ \\\n  --yes \\\n  \"${MULTIARCH_IMAGE}\"\n\n# If latest tag was created,\
        \ also attest it\nif [[ \"${CREATED_LATEST_TAG}\" == \"true\" ]]; then\n \
        \ latest_tag=\"$(./scripts/image_tag.sh --version latest)\"\n  echo \"Generating\
        \ SBOM for latest image: ${latest_tag}\"\n  syft \"${latest_tag}\" -o spdx-json\
        \ > coder_latest_sbom.spdx.json\n\n  echo \"Attesting SBOM to latest image:\
        \ ${latest_tag}\"\n  cosign clean --force=true \"${latest_tag}\"\n  cosign\
        \ attest --type spdxjson \\\n    --predicate coder_latest_sbom.spdx.json \\\
        \n    --yes \\\n    \"${latest_tag}\"\nfi\n"
    - name: GitHub Attestation for Docker image
      id: attest_main
      if: ${{ !inputs.dry_run }}
      continue-on-error: true
      uses: actions/attest@7667f588f2f73a90cea6c7ac70e78266c4f76616
      with:
        subject-name: ${{ steps.build_docker.outputs.multiarch_image }}
        predicate-type: https://slsa.dev/provenance/v1
        predicate: "{\n  \"buildType\": \"https://github.com/actions/runner-images/\"\
          ,\n  \"builder\": {\n    \"id\": \"https://github.com/${{ github.repository\
          \ }}/actions/runs/${{ github.run_id }}\"\n  },\n  \"invocation\": {\n  \
          \  \"configSource\": {\n      \"uri\": \"git+https://github.com/${{ github.repository\
          \ }}@${{ github.ref }}\",\n      \"digest\": {\n        \"sha1\": \"${{\
          \ github.sha }}\"\n      },\n      \"entryPoint\": \".github/workflows/release.yaml\"\
          \n    },\n    \"environment\": {\n      \"github_workflow\": \"${{ github.workflow\
          \ }}\",\n      \"github_run_id\": \"${{ github.run_id }}\"\n    }\n  },\n\
          \  \"metadata\": {\n    \"buildInvocationID\": \"${{ github.run_id }}\"\
          ,\n    \"completeness\": {\n      \"environment\": true,\n      \"materials\"\
          : true\n    }\n  }\n}\n"
        push-to-registry: true
    - name: Get latest tag name
      id: latest_tag
      if: ${{ !inputs.dry_run && steps.build_docker.outputs.created_latest_tag ==
        'true' }}
      run: echo "tag=$(./scripts/image_tag.sh --version latest)" >> "$GITHUB_OUTPUT"
    - name: GitHub Attestation for "latest" Docker image
      id: attest_latest
      if: ${{ !inputs.dry_run && steps.build_docker.outputs.created_latest_tag ==
        'true' }}
      continue-on-error: true
      uses: actions/attest@7667f588f2f73a90cea6c7ac70e78266c4f76616
      with:
        subject-name: ${{ steps.latest_tag.outputs.tag }}
        predicate-type: https://slsa.dev/provenance/v1
        predicate: "{\n  \"buildType\": \"https://github.com/actions/runner-images/\"\
          ,\n  \"builder\": {\n    \"id\": \"https://github.com/${{ github.repository\
          \ }}/actions/runs/${{ github.run_id }}\"\n  },\n  \"invocation\": {\n  \
          \  \"configSource\": {\n      \"uri\": \"git+https://github.com/${{ github.repository\
          \ }}@${{ github.ref }}\",\n      \"digest\": {\n        \"sha1\": \"${{\
          \ github.sha }}\"\n      },\n      \"entryPoint\": \".github/workflows/release.yaml\"\
          \n    },\n    \"environment\": {\n      \"github_workflow\": \"${{ github.workflow\
          \ }}\",\n      \"github_run_id\": \"${{ github.run_id }}\"\n    }\n  },\n\
          \  \"metadata\": {\n    \"buildInvocationID\": \"${{ github.run_id }}\"\
          ,\n    \"completeness\": {\n      \"environment\": true,\n      \"materials\"\
          : true\n    }\n  }\n}\n"
        push-to-registry: true
    - name: Check attestation status
      if: ${{ !inputs.dry_run }}
      run: "if [[ \"${{ steps.attest_base.outcome }}\" == \"failure\" && \"${{ steps.attest_base.conclusion\
        \ }}\" != \"skipped\" ]]; then\n  echo \"::warning::GitHub attestation for\
        \ base image failed\"\nfi\nif [[ \"${{ steps.attest_main.outcome }}\" == \"\
        failure\" ]]; then\n  echo \"::warning::GitHub attestation for main image\
        \ failed\"\nfi\nif [[ \"${{ steps.attest_latest.outcome }}\" == \"failure\"\
        \ && \"${{ steps.attest_latest.conclusion }}\" != \"skipped\" ]]; then\n \
        \ echo \"::warning::GitHub attestation for latest image failed\"\nfi\n"
    - name: Generate offline docs
      run: 'version="$(./scripts/version.sh)"

        make -j build/coder_docs_"$version".tgz

        '
    - name: ls build
      run: ls -lh build
    - name: Publish Coder CLI binaries and detached signatures to GCS
      if: ${{ !inputs.dry_run }}
      run: "set -euxo pipefail\n\nversion=\"$(./scripts/version.sh)\"\n\n# Source\
        \ array of slim binaries\ndeclare -A binaries\nbinaries[\"coder-darwin-amd64\"\
        ]=\"coder-slim_${version}_darwin_amd64\"\nbinaries[\"coder-darwin-arm64\"\
        ]=\"coder-slim_${version}_darwin_arm64\"\nbinaries[\"coder-linux-amd64\"]=\"\
        coder-slim_${version}_linux_amd64\"\nbinaries[\"coder-linux-arm64\"]=\"coder-slim_${version}_linux_arm64\"\
        \nbinaries[\"coder-linux-armv7\"]=\"coder-slim_${version}_linux_armv7\"\n\
        binaries[\"coder-windows-amd64.exe\"]=\"coder-slim_${version}_windows_amd64.exe\"\
        \nbinaries[\"coder-windows-arm64.exe\"]=\"coder-slim_${version}_windows_arm64.exe\"\
        \n\nfor cli_name in \"${!binaries[@]}\"; do\n  slim_binary=\"${binaries[$cli_name]}\"\
        \n  detached_signature=\"${slim_binary}.asc\"\n  gcloud storage cp \"./build/${slim_binary}\"\
        \ \"gs://releases.coder.com/coder-cli/${version}/${cli_name}\"\n  gcloud storage\
        \ cp \"./build/${detached_signature}\" \"gs://releases.coder.com/coder-cli/${version}/${cli_name}.asc\"\
        \ndone\n"
    - name: Publish release
      run: "set -euo pipefail\n\npublish_args=()\nif [[ $CODER_RELEASE_CHANNEL ==\
        \ \"stable\" ]]; then\n  publish_args+=(--stable)\nfi\nif [[ $CODER_DRY_RUN\
        \ == *t* ]]; then\n  publish_args+=(--dry-run)\nfi\ndeclare -p publish_args\n\
        \n# Build the list of files to publish\nfiles=(\n  ./build/*_installer.exe\n\
        \  ./build/*.zip\n  ./build/*.tar.gz\n  ./build/*.tgz\n  ./build/*.apk\n \
        \ ./build/*.deb\n  ./build/*.rpm\n  \"./coder_${VERSION}_sbom.spdx.json\"\n\
        )\n\n# Only include the latest SBOM file if it was created\nif [[ \"${CREATED_LATEST_TAG}\"\
        \ == \"true\" ]]; then\n  files+=(./coder_latest_sbom.spdx.json)\nfi\n\n./scripts/release/publish.sh\
        \ \\\n  \"${publish_args[@]}\" \\\n  --release-notes-file \"$CODER_RELEASE_NOTES_FILE\"\
        \ \\\n  \"${files[@]}\"\n"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        CODER_GPG_RELEASE_KEY_BASE64: ${{ secrets.GPG_RELEASE_KEY_BASE64 }}
        VERSION: ${{ steps.version.outputs.version }}
        CREATED_LATEST_TAG: ${{ steps.build_docker.outputs.created_latest_tag }}
    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093
      with:
        workload_identity_provider: ${{ vars.GCP_WORKLOAD_ID_PROVIDER }}
        service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
    - name: Setup GCloud SDK
      uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db
    - name: Publish Helm Chart
      if: ${{ !inputs.dry_run }}
      run: 'set -euo pipefail

        version="$(./scripts/version.sh)"

        mkdir -p build/helm

        cp "build/coder_helm_${version}.tgz" build/helm

        cp "build/provisioner_helm_${version}.tgz" build/helm

        gsutil cp gs://helm.coder.com/v2/index.yaml build/helm/index.yaml

        helm repo index build/helm --url https://helm.coder.com/v2 --merge build/helm/index.yaml

        gsutil -h "Cache-Control:no-cache,max-age=0" cp "build/helm/coder_helm_${version}.tgz"
        gs://helm.coder.com/v2

        gsutil -h "Cache-Control:no-cache,max-age=0" cp "build/helm/provisioner_helm_${version}.tgz"
        gs://helm.coder.com/v2

        gsutil -h "Cache-Control:no-cache,max-age=0" cp "build/helm/index.yaml" gs://helm.coder.com/v2

        gsutil -h "Cache-Control:no-cache,max-age=0" cp "helm/artifacthub-repo.yml"
        gs://helm.coder.com/v2

        helm push "build/coder_helm_${version}.tgz" oci://ghcr.io/coder/chart

        helm push "build/provisioner_helm_${version}.tgz" oci://ghcr.io/coder/chart

        '
    - name: Upload artifacts to actions (if dry-run)
      if: ${{ inputs.dry_run }}
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
      with:
        name: release-artifacts
        path: './build/*_installer.exe

          ./build/*.zip

          ./build/*.tar.gz

          ./build/*.tgz

          ./build/*.apk

          ./build/*.deb

          ./build/*.rpm

          ./coder_${{ steps.version.outputs.version }}_sbom.spdx.json

          '
        retention-days: 7
    - name: Upload latest sbom artifact to actions (if dry-run)
      if: inputs.dry_run && steps.build_docker.outputs.created_latest_tag == 'true'
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
      with:
        name: latest-sbom-artifact
        path: ./coder_latest_sbom.spdx.json
        retention-days: 7
    - name: Send repository-dispatch event
      if: ${{ !inputs.dry_run }}
      uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697
      with:
        token: ${{ secrets.CDRCI_GITHUB_TOKEN }}
        repository: coder/packages
        event-type: coder-release
        client-payload: '{"coder_version": "${{ steps.version.outputs.version }}",
          "release_channel": "${{ inputs.release_channel }}"}'
  publish-homebrew:
    name: Publish to Homebrew tap
    runs-on: ubuntu-latest
    needs: release
    if: ${{ !inputs.dry_run }}
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@20cf305ff2072d973412fa9b1e3a4f227bda3c76
      with:
        egress-policy: audit
    - name: Update homebrew
      env:
        GH_REPO: coder/homebrew-coder
        GH_TOKEN: ${{ secrets.CDRCI_GITHUB_TOKEN }}
        VERSION: ${{ needs.release.outputs.version }}
      run: "# Keep version number around for reference, removing any potential leading\
        \ v\ncoder_version=\"$(echo \"${VERSION}\" | tr -d v)\"\n\nset -euxo pipefail\n\
        \n# Setup Git\ngit config --global user.email \"ci@coder.com\"\ngit config\
        \ --global user.name \"Coder CI\"\ngit config --global credential.helper \"\
        store\"\n\ntemp_dir=\"$(mktemp -d)\"\ncd \"$temp_dir\"\n\n# Download checksums\n\
        checksums_url=\"$(gh release view --repo coder/coder \"v$coder_version\" --json\
        \ assets \\\n  | jq -r \".assets | map(.url) | .[]\" \\\n  | grep -e \".checksums.txt\\\
        $\")\"\nwget \"$checksums_url\" -O checksums.txt\n\n# Get the SHAs\ndarwin_arm_sha=\"\
        $(grep \"darwin_arm64.zip\" checksums.txt | awk '{ print $1 }')\"\ndarwin_intel_sha=\"\
        $(grep \"darwin_amd64.zip\" checksums.txt | awk '{ print $1 }')\"\nlinux_sha=\"\
        $(grep \"linux_amd64.tar.gz\" checksums.txt | awk '{ print $1 }')\"\n\necho\
        \ \"macOS arm64: $darwin_arm_sha\"\necho \"macOS amd64: $darwin_intel_sha\"\
        \necho \"Linux amd64: $linux_sha\"\n\n# Check out the homebrew repo\ngit clone\
        \ \"https://github.com/$GH_REPO\" homebrew-coder\nbrew_branch=\"auto-release/$coder_version\"\
        \ncd homebrew-coder\n\n# Check if a PR already exists.\npr_count=\"$(gh pr\
        \ list --search \"head:$brew_branch\" --json id,closed | jq -r \".[] | select(.closed\
        \ == false) | .id\" | wc -l)\"\nif [ \"$pr_count\" -gt 0 ]; then\n  echo \"\
        Bailing out as PR already exists\" 2>&1\n  exit 0\nfi\n\n# Set up cdrci credentials\
        \ for pushing to homebrew-coder\necho \"https://x-access-token:$GH_TOKEN@github.com\"\
        \ >> ~/.git-credentials\n# Update the formulae and push\ngit checkout -b \"\
        $brew_branch\"\n./scripts/update-v2.sh \"$coder_version\" \"$darwin_arm_sha\"\
        \ \"$darwin_intel_sha\" \"$linux_sha\"\ngit add .\ngit commit -m \"coder $coder_version\"\
        \ngit push -u origin -f \"$brew_branch\"\n\n# Create PR\ngh pr create \\\n\
        \  -B master -H \"$brew_branch\" \\\n  -t \"coder $coder_version\" \\\n  -b\
        \ \"\" \\\n  -r \"${GITHUB_ACTOR}\" \\\n  -a \"${GITHUB_ACTOR}\" \\\n  -b\
        \ \"This automatic PR was triggered by the release of Coder v$coder_version\"\
        \n"
  publish-winget:
    name: Publish to winget-pkgs
    runs-on: ubuntu-latest
    needs: release
    if: ${{ !inputs.dry_run }}
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@20cf305ff2072d973412fa9b1e3a4f227bda3c76
      with:
        egress-policy: audit
    - name: Sync fork
      run: gh repo sync cdrci/winget-pkgs -b master
      env:
        GH_TOKEN: ${{ secrets.CDRCI_GITHUB_TOKEN }}
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: 0
        persist-credentials: false
    - name: Fetch git tags
      run: git fetch --tags --force
    - name: Install wingetcreate
      run: 'Invoke-WebRequest https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe

        '
    - name: Submit updated manifest to winget-pkgs
      run: "# The package version is the same as the tag minus the leading \"v\".\n\
        # The version in this output already has the leading \"v\" removed but\n#\
        \ we do it again to be safe.\n$version = $env:VERSION.Trim('v')\n\n$release_assets\
        \ = gh release view --repo coder/coder \"v${version}\" --json assets | `\n\
        \  ConvertFrom-Json\n# Get the installer URLs from the release assets.\n$amd64_installer_url\
        \ = $release_assets.assets | `\n  Where-Object name -Match \".*_windows_amd64_installer.exe$\"\
        \ | `\n  Select -ExpandProperty url\n$amd64_zip_url = $release_assets.assets\
        \ | `\n  Where-Object name -Match \".*_windows_amd64.zip$\" | `\n  Select\
        \ -ExpandProperty url\n$arm64_zip_url = $release_assets.assets | `\n  Where-Object\
        \ name -Match \".*_windows_arm64.zip$\" | `\n  Select -ExpandProperty url\n\
        \necho \"amd64 Installer URL: ${amd64_installer_url}\"\necho \"amd64 zip URL:\
        \ ${amd64_zip_url}\"\necho \"arm64 zip URL: ${arm64_zip_url}\"\necho \"Package\
        \ version: ${version}\"\n\n.\\wingetcreate.exe update Coder.Coder `\n  --submit\
        \ `\n  --version \"${version}\" `\n  --urls \"${amd64_installer_url}\" \"\
        ${amd64_zip_url}\" \"${arm64_zip_url}\" `\n  --token \"$env:WINGET_GH_TOKEN\"\
        \n"
      env:
        GH_TOKEN: ${{ github.token }}
        WINGET_GH_TOKEN: ${{ secrets.CDRCI_GITHUB_TOKEN }}
        VERSION: ${{ needs.release.outputs.version }}
    - name: Comment on PR
      run: "# wait 30 seconds\nStart-Sleep -Seconds 30.0\n# Find the PR that wingetcreate\
        \ just made.\n$version = $env:VERSION.Trim('v')\n$pr_list = gh pr list --repo\
        \ microsoft/winget-pkgs --search \"author:cdrci Coder.Coder version ${version}\"\
        \ --limit 1 --json number | `\n  ConvertFrom-Json\n$pr_number = $pr_list[0].number\n\
        \ngh pr comment --repo microsoft/winget-pkgs \"${pr_number}\" --body \"\U0001F916\
        \ cc: @deansheather @matifali\"\n"
      env:
        GH_TOKEN: ${{ secrets.CDRCI_GITHUB_TOKEN }}
        VERSION: ${{ needs.release.outputs.version }}
  publish-sqlc:
    name: Publish to schema sqlc cloud
    runs-on: ubuntu-latest
    needs: release
    if: ${{ !inputs.dry_run }}
    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@20cf305ff2072d973412fa9b1e3a4f227bda3c76
      with:
        egress-policy: audit
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: 1
        persist-credentials: false
    - name: Setup Go
      uses: ./.github/actions/setup-go
    - name: Setup sqlc
      uses: ./.github/actions/setup-sqlc
    - name: Push schema to sqlc cloud
      continue-on-error: true
      run: 'make sqlc-push

        '
